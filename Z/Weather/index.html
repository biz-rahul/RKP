
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  #uw-root {
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(145deg, #0f0c29, #1a1a4e, #24243e);
    min-height: 100vh;
    padding: 20px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  #uw-root::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
    top: -100px; right: -100px;
    border-radius: 50%;
    pointer-events: none;
  }

  #uw-root::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    border-radius: 50%;
    pointer-events: none;
  }

  .uw-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 2;
  }

  .uw-brand {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  .uw-search-wrap {
    display: flex;
    gap: 8px;
    flex: 1;
    max-width: 340px;
    margin: 0 16px;
  }

  .uw-search-wrap input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 9px 14px;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .uw-search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
  .uw-search-wrap input:focus { border-color: rgba(99,102,241,0.6); }

  .uw-search-wrap button {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 12px;
    padding: 9px 16px;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .uw-search-wrap button:hover { opacity: 0.85; }
  .uw-search-wrap button:active { transform: scale(0.97); }

  .uw-time {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    text-align: right;
    min-width: 90px;
  }

  .uw-hero {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 28px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 2;
    backdrop-filter: blur(12px);
  }

  .uw-weather-icon {
    font-size: 72px;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
    flex-shrink: 0;
  }

  .uw-hero-info { flex: 1; }

  .uw-city-name {
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .uw-pin { font-size: 14px; }

  .uw-temp-main {
    font-size: 80px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fff 40%, rgba(99,102,241,0.7));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -3px;
  }

  .uw-condition {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    text-transform: capitalize;
    margin-top: 4px;
  }

  .uw-feels {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin-top: 4px;
  }

  .uw-hero-right {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
  }

  .uw-badge {
    background: rgba(99,102,241,0.2);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #a5b4fc;
    white-space: nowrap;
  }

  .uw-badge.danger { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.3); color: #fca5a5; }
  .uw-badge.warn { background: rgba(245,158,11,0.2); border-color: rgba(245,158,11,0.3); color: #fcd34d; }
  .uw-badge.good { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.3); color: #6ee7b7; }

  .uw-grid4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 16px;
    position: relative;
    z-index: 2;
  }

  .uw-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 16px;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s;
  }

  .uw-card:hover { border-color: rgba(255,255,255,0.16); }

  .uw-card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
  }

  .uw-card-icon { font-size: 20px; margin-bottom: 6px; display: block; }

  .uw-card-val {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  .uw-card-unit {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-left: 3px;
  }

  .uw-card-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-top: 4px;
  }

  .uw-grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
    position: relative;
    z-index: 2;
  }

  .uw-bar-wrap { margin-top: 8px; }

  .uw-bar-track {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }

  .uw-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #6366f1, #06b6d4);
    transition: width 0.8s ease;
  }

  .uw-sun-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
  }

  .uw-sun-val { color: #fcd34d; font-weight: 600; }

  .uw-aqi-ring-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
  }

  .uw-aqi-ring {
    position: relative;
    width: 70px;
    height: 70px;
    flex-shrink: 0;
  }

  .uw-aqi-ring svg { transform: rotate(-90deg); }

  .uw-aqi-center {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }

  .uw-aqi-desc { font-size: 12px; color: rgba(255,255,255,0.4); }
  .uw-aqi-status { font-size: 15px; font-weight: 600; color: #6ee7b7; margin-top: 2px; }

  .uw-forecast-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    position: relative;
    z-index: 2;
  }

  .uw-fc-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
  }

  .uw-fc-day { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
  .uw-fc-icon { font-size: 26px; margin-bottom: 6px; }
  .uw-fc-hi { font-size: 16px; font-weight: 700; color: #fff; }
  .uw-fc-lo { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 1px; }
  .uw-fc-rain { font-size: 11px; color: #93c5fd; margin-top: 4px; }

  .uw-loading {
    text-align: center;
    padding: 40px;
    color: rgba(255,255,255,0.4);
    font-size: 15px;
  }

  .uw-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .uw-error {
    text-align: center;
    padding: 30px;
    color: #fca5a5;
    font-size: 14px;
  }

  .uw-section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 10px;
    position: relative;
    z-index: 2;
  }
</style>

<div id="uw-root">
  <div class="uw-header">
    <div class="uw-brand">Ultra Weather</div>
    <div class="uw-search-wrap">
      <input type="text" id="uw-city-input" placeholder="City name..." value="Patna" />
      <button onclick="uwFetch()">Search</button>
    </div>
    <div class="uw-time" id="uw-time"></div>
  </div>

  <div id="uw-content">
    <div class="uw-loading"><div class="uw-spinner"></div>Fetching weather data...</div>
  </div>
</div>

<script>
const OW_KEY = "17fd2d20dbbe99b80e7ff4eddcbe2cde";

function uwTime() {
  const el = document.getElementById('uw-time');
  if (!el) return;
  const now = new Date();
  el.innerHTML = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) + '<br>' + now.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short'});
}
setInterval(uwTime, 1000);
uwTime();

function weatherIcon(code, isDay) {
  const icons = {
    200:'⛈️',201:'⛈️',202:'⛈️',210:'🌩️',211:'🌩️',212:'⛈️',221:'🌩️',230:'⛈️',231:'⛈️',232:'⛈️',
    300:'🌦️',301:'🌦️',302:'🌧️',310:'🌧️',311:'🌧️',312:'🌧️',313:'🌧️',314:'🌧️',321:'🌧️',
    500:'🌧️',501:'🌧️',502:'🌧️',503:'🌧️',504:'🌧️',511:'🌨️',520:'🌧️',521:'🌧️',522:'🌧️',531:'🌧️',
    600:'🌨️',601:'❄️',602:'❄️',611:'🌨️',612:'🌨️',613:'🌨️',615:'🌧️',616:'🌧️',620:'🌨️',621:'🌨️',622:'🌨️',
    701:'🌫️',711:'🌫️',721:'🌫️',731:'🌪️',741:'🌫️',751:'🌫️',761:'🌫️',762:'🌋',771:'💨',781:'🌪️',
    800: isDay ? '☀️' : '🌙',
    801:'🌤️',802:'⛅',803:'🌥️',804:'☁️'
  };
  return icons[code] || '🌡️';
}

function uvClass(uv) {
  if (uv <= 2) return 'good';
  if (uv <= 5) return '';
  if (uv <= 7) return 'warn';
  return 'danger';
}

function uvLabel(uv) {
  if (uv <= 2) return 'Low';
  if (uv <= 5) return 'Moderate';
  if (uv <= 7) return 'High';
  if (uv <= 10) return 'Very High';
  return 'Extreme';
}

function windDir(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

function aqiStatus(aqi) {
  return ['','Good','Fair','Moderate','Poor','Very Poor'][aqi] || 'N/A';
}

function aqiColor(aqi) {
  return ['','#6ee7b7','#fcd34d','#fdba74','#fca5a5','#f87171'][aqi] || '#999';
}

function formatTime(unix, offset) {
  const d = new Date((unix + offset) * 1000);
  return d.toUTCString().slice(17, 22);
}

function dayLabel(i) {
  const d = new Date();
  d.setDate(d.getDate() + i);
  if (i === 0) return 'Today';
  if (i === 1) return 'Tomorrow';
  return d.toLocaleDateString('en-IN', {weekday:'short'});
}

async function uwFetch() {
  const city = document.getElementById('uw-city-input').value.trim() || 'Patna';
  document.getElementById('uw-content').innerHTML = '<div class="uw-loading"><div class="uw-spinner"></div>Loading ' + city + '...</div>';

  try {
    const [curr, fore, air] = await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${OW_KEY}`).then(r => r.json()),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=metric&cnt=40&appid=${OW_KEY}`).then(r => r.json()),
      fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=25.61&lon=85.14&appid=${OW_KEY}`).then(r => r.json())
    ]);

    if (curr.cod !== 200) throw new Error(curr.message || 'City not found');

    const lat = curr.coord.lat, lon = curr.coord.lon;
    const airRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${OW_KEY}`).then(r => r.json());

    const isDay = Date.now()/1000 > curr.sys.sunrise && Date.now()/1000 < curr.sys.sunset;
    const icon = weatherIcon(curr.weather[0].id, isDay);
    const aqi = airRes?.list?.[0]?.main?.aqi || 1;
    const comp = airRes?.list?.[0]?.components || {};

    const dailyMap = {};
    fore.list.forEach(f => {
      const d = f.dt_txt.split(' ')[0];
      if (!dailyMap[d]) dailyMap[d] = { highs: [], lows: [], icons: [], rain: 0, ids: [] };
      dailyMap[d].highs.push(f.main.temp_max);
      dailyMap[d].lows.push(f.main.temp_min);
      dailyMap[d].ids.push(f.weather[0].id);
      dailyMap[d].rain += (f.rain?.['3h'] || 0);
    });
    const dailyDays = Object.keys(dailyMap).slice(0, 5);

    const uvValue = Math.round(curr.uvi || 4);
    const visKm = ((curr.visibility || 10000) / 1000).toFixed(1);
    const dewPoint = (curr.main.temp - ((100 - curr.main.humidity) / 5)).toFixed(1);
    const aod = curr.clouds.all;
    const aqiPct = (aqi / 5) * 100;

    document.getElementById('uw-content').innerHTML = `
      <div class="uw-hero">
        <div class="uw-weather-icon">${icon}</div>
        <div class="uw-hero-info">
          <div class="uw-city-name"><span class="uw-pin">📍</span>${curr.name}, ${curr.sys.country}</div>
          <div class="uw-temp-main">${Math.round(curr.main.temp)}°</div>
          <div class="uw-condition">${curr.weather[0].description}</div>
          <div class="uw-feels">Feels like ${Math.round(curr.main.feels_like)}° · High ${Math.round(curr.main.temp_max)}° · Low ${Math.round(curr.main.temp_min)}°</div>
        </div>
        <div class="uw-hero-right">
          <div class="uw-badge ${uvClass(uvValue)}">UV ${uvValue} — ${uvLabel(uvValue)}</div>
          <div class="uw-badge">AQI ${aqi} — ${aqiStatus(aqi)}</div>
          <div class="uw-badge">${curr.clouds.all}% Cloud Cover</div>
        </div>
      </div>

      <div class="uw-grid4">
        <div class="uw-card">
          <div class="uw-card-label">Humidity</div>
          <span class="uw-card-icon">💧</span>
          <div class="uw-card-val">${curr.main.humidity}<span class="uw-card-unit">%</span></div>
          <div class="uw-bar-wrap"><div class="uw-bar-track"><div class="uw-bar-fill" style="width:${curr.main.humidity}%; background: linear-gradient(90deg,#06b6d4,#3b82f6)"></div></div></div>
          <div class="uw-card-sub">Dew point ${dewPoint}°C</div>
        </div>
        <div class="uw-card">
          <div class="uw-card-label">Wind</div>
          <span class="uw-card-icon">💨</span>
          <div class="uw-card-val">${Math.round(curr.wind.speed * 3.6)}<span class="uw-card-unit">km/h</span></div>
          <div class="uw-card-sub">${windDir(curr.wind.deg)} · Gust ${Math.round((curr.wind.gust || curr.wind.speed) * 3.6)} km/h</div>
        </div>
        <div class="uw-card">
          <div class="uw-card-label">Pressure</div>
          <span class="uw-card-icon">🌡️</span>
          <div class="uw-card-val">${curr.main.pressure}<span class="uw-card-unit">hPa</span></div>
          <div class="uw-card-sub">Sea level ${curr.main.sea_level || curr.main.pressure} hPa</div>
        </div>
        <div class="uw-card">
          <div class="uw-card-label">Visibility</div>
          <span class="uw-card-icon">👁️</span>
          <div class="uw-card-val">${visKm}<span class="uw-card-unit">km</span></div>
          <div class="uw-card-sub">${parseFloat(visKm) >= 8 ? 'Clear visibility' : parseFloat(visKm) >= 4 ? 'Moderate' : 'Poor visibility'}</div>
        </div>
      </div>

      <div class="uw-grid4">
        <div class="uw-card">
          <div class="uw-card-label">Sunrise / Sunset</div>
          <span class="uw-card-icon">🌅</span>
          <div class="uw-sun-row">
            <div>Rise<br><span class="uw-sun-val">${formatTime(curr.sys.sunrise, curr.timezone)}</span></div>
            <div style="text-align:right">Set<br><span class="uw-sun-val">${formatTime(curr.sys.sunset, curr.timezone)}</span></div>
          </div>
        </div>
        <div class="uw-card">
          <div class="uw-card-label">Min / Max Temp</div>
          <span class="uw-card-icon">🌡️</span>
          <div class="uw-card-val">${Math.round(curr.main.temp_min)}° <span style="color:rgba(255,255,255,0.3);font-size:18px">/ </span>${Math.round(curr.main.temp_max)}°</div>
          <div class="uw-card-sub">Ground level ${curr.main.grnd_level || curr.main.pressure} hPa</div>
        </div>
        <div class="uw-card">
          <div class="uw-card-label">Air Quality</div>
          <div class="uw-aqi-ring-wrap">
            <div class="uw-aqi-ring">
              <svg viewBox="0 0 70 70" width="70" height="70">
                <circle cx="35" cy="35" r="28" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
                <circle cx="35" cy="35" r="28" fill="none" stroke="${aqiColor(aqi)}" stroke-width="8" stroke-dasharray="${(aqiPct/100)*175.9} 175.9" stroke-linecap="round"/>
              </svg>
              <div class="uw-aqi-center">${aqi}</div>
            </div>
            <div>
              <div class="uw-aqi-status">${aqiStatus(aqi)}</div>
              <div class="uw-aqi-desc">PM2.5 ${(comp.pm2_5||0).toFixed(1)} μg/m³</div>
              <div class="uw-aqi-desc">PM10 ${(comp.pm10||0).toFixed(1)} μg/m³</div>
            </div>
          </div>
        </div>
        <div class="uw-card">
          <div class="uw-card-label">Cloud Cover</div>
          <span class="uw-card-icon">☁️</span>
          <div class="uw-card-val">${aod}<span class="uw-card-unit">%</span></div>
          <div class="uw-bar-wrap"><div class="uw-bar-track"><div class="uw-bar-fill" style="width:${aod}%;background:linear-gradient(90deg,#8b5cf6,#6366f1)"></div></div></div>
          <div class="uw-card-sub">${aod < 20 ? 'Clear sky' : aod < 60 ? 'Partly cloudy' : 'Overcast'}</div>
        </div>
      </div>

      <div class="uw-section-title">5-Day Forecast</div>
      <div class="uw-forecast-row">
        ${dailyDays.map((d, i) => {
          const day = dailyMap[d];
          const hi = Math.round(Math.max(...day.highs));
          const lo = Math.round(Math.min(...day.lows));
          const midId = day.ids[Math.floor(day.ids.length/2)];
          const rainMm = day.rain.toFixed(1);
          return `<div class="uw-fc-card">
            <div class="uw-fc-day">${dayLabel(i)}</div>
            <div class="uw-fc-icon">${weatherIcon(midId, true)}</div>
            <div class="uw-fc-hi">${hi}°</div>
            <div class="uw-fc-lo">${lo}°</div>
            ${parseFloat(rainMm) > 0 ? `<div class="uw-fc-rain">💧 ${rainMm}mm</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    `;
  } catch(e) {
    document.getElementById('uw-content').innerHTML = `<div class="uw-error">❌ ${e.message || 'Could not load weather. Check city name.'}</div>`;
  }
}

uwFetch();
</script>
