<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff512f, #dd2476);
  color: white;
}
.container {
  padding: 20px;
}
.header {
  text-align: center;
  font-size: 2rem;
  font-weight: 700;
}
.card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}
.big-temp {
  font-size: 4rem;
  font-weight: 700;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.small-card {
  padding: 10px;
  border-radius: 15px;
  background: rgba(255,255,255,0.15);
  text-align: center;
}
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #fff;
  color: #333;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">🔥 Ultra Weather</div>

  <div class="card">
    <div id="location">Detecting location...</div>
    <div class="big-temp" id="temp">--°</div>
    <div id="condition">Loading...</div>
    <button onclick="getWeather()">Refresh</button>
  </div>

  <div class="grid">
    <div class="small-card">Humidity<br><span id="humidity">--</span></div>
    <div class="small-card">Wind<br><span id="wind">--</span></div>
    <div class="small-card">Pressure<br><span id="pressure">--</span></div>
    <div class="small-card">UV Index<br><span id="uv">--</span></div>
  </div>
</div>

<script>
const apiKey = "YOUR_API_KEY"; // Replace with OpenWeather API key

function getWeather() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("location").innerText = data.name;
        document.getElementById("temp").innerText = Math.round(data.main.temp) + "°C";
        document.getElementById("condition").innerText = data.weather[0].description;
        document.getElementById("humidity").innerText = data.main.humidity + "%";
        document.getElementById("wind").innerText = data.wind.speed + " km/h";
        document.getElementById("pressure").innerText = data.main.pressure + " hPa";
      });

    fetch(`https://api.openweathermap.org/data/2.5/uvi?lat=${lat}&lon=${lon}&appid=${apiKey}`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("uv").innerText = data.value;
      });

  });
}

getWeather();
</script>
</body>
</html>
