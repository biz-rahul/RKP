
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.tk-root{padding:2rem 1rem}
.tk-header{text-align:center;margin-bottom:2.5rem}
.tk-title{font-size:28px;font-weight:500;color:var(--color-text-primary);letter-spacing:-0.5px}
.tk-sub{font-size:14px;color:var(--color-text-secondary);margin-top:6px}
.tk-search-wrap{max-width:440px;margin:1.2rem auto 0;position:relative}
.tk-search-wrap input{width:100%;padding:10px 16px 10px 38px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;outline:none}
.tk-search-wrap input:focus{border-color:var(--color-border-primary);box-shadow:0 0 0 3px rgba(99,99,200,0.08)}
.tk-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--color-text-tertiary);font-size:14px;pointer-events:none}
.tk-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.8rem;justify-content:center}
.tk-tab{padding:6px 14px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all 0.15s}
.tk-tab:hover{border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.tk-tab.active{background:var(--color-background-secondary);border-color:var(--color-border-primary);color:var(--color-text-primary);font-weight:500}
.tk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.tk-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.2rem;transition:border-color 0.15s}
.tk-card:hover{border-color:var(--color-border-secondary)}
.tk-card-header{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.tk-card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.tk-card-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.tk-card-desc{font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem;padding-left:42px;line-height:1.5}
.tk-links{display:flex;flex-direction:column;gap:4px}
.tk-link{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);text-decoration:none;color:var(--color-text-primary);font-size:13px;transition:all 0.15s;cursor:pointer}
.tk-link:hover{border-color:var(--color-border-primary);background:var(--color-background-primary)}
.tk-link-arrow{font-size:11px;color:var(--color-text-tertiary)}
.tk-link-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.tk-cat-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin:10px 0 6px}
.tk-empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:14px;grid-column:1/-1}
.bg-blue{background:#E6F1FB;color:#185FA5}
.bg-purple{background:#EEEDFE;color:#534AB7}
.bg-teal{background:#E1F5EE;color:#0F6E56}
.bg-amber{background:#FAEEDA;color:#854F0B}
.bg-coral{background:#FAECE7;color:#993C1D}
.bg-pink{background:#FBEAF0;color:#993556}
.bg-green{background:#EAF3DE;color:#3B6D11}
.bg-gray{background:#F1EFE8;color:#5F5E5A}
</style>

<div class="tk-root">
  <div class="tk-header">
    <div class="tk-title">Web Toolkit</div>
    <div class="tk-sub">Curated tools, resources & links — all in one place</div>
    <div class="tk-search-wrap">
      <span class="tk-search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search tools and links...">
    </div>
  </div>
  <div class="tk-tabs" id="tabs"></div>
  <div class="tk-grid" id="grid"></div>
</div>

<script>
const ICONS = [
  {cls:'bg-blue',sym:'&#9670;'},
  {cls:'bg-purple',sym:'&#9679;'},
  {cls:'bg-teal',sym:'&#9632;'},
  {cls:'bg-amber',sym:'&#9650;'},
  {cls:'bg-coral',sym:'&#9660;'},
  {cls:'bg-pink',sym:'&#9679;'},
  {cls:'bg-green',sym:'&#9632;'},
  {cls:'bg-gray',sym:'&#9670;'},
];

const MOCK = {
  sections: {
    "AI_Tools": {
      description: "Cutting-edge AI assistants and generators",
      tools: [
        {name:"ChatGPT",url:"https://chat.openai.com"},
        {name:"Claude",url:"https://claude.ai"},
        {name:"Gemini",url:"https://gemini.google.com"},
        {name:"Midjourney",url:"https://midjourney.com"},
        {name:"Perplexity AI",url:"https://perplexity.ai"}
      ]
    },
    "Developer_Resources": {
      description: "Essential tools for every developer",
      categories: {
        "References": [
          {name:"MDN Web Docs",url:"https://developer.mozilla.org"},
          {name:"DevDocs",url:"https://devdocs.io"},
          {name:"Can I Use",url:"https://caniuse.com"}
        ],
        "Code_Sharing": [
          {name:"CodePen",url:"https://codepen.io"},
          {name:"JSFiddle",url:"https://jsfiddle.net"},
          {name:"StackBlitz",url:"https://stackblitz.com"}
        ]
      }
    },
    "Design": {
      description: "Design inspiration, assets and tools",
      tools: [
        {name:"Figma",url:"https://figma.com"},
        {name:"Dribbble",url:"https://dribbble.com"},
        {name:"Coolors",url:"https://coolors.co"},
        {name:"Unsplash",url:"https://unsplash.com"}
      ]
    },
    "Learning": {
      description: "Courses, tutorials and documentation",
      sites: [
        {name:"freeCodeCamp",url:"https://freecodecamp.org"},
        {name:"The Odin Project",url:"https://theodinproject.com"},
        {name:"Roadmap.sh",url:"https://roadmap.sh"},
        {name:"CS50",url:"https://cs50.harvard.edu"}
      ]
    },
    "Productivity": {
      description: "Tools to help you focus and ship faster",
      tools: [
        {name:"Notion",url:"https://notion.so"},
        {name:"Linear",url:"https://linear.app"},
        {name:"Excalidraw",url:"https://excalidraw.com"}
      ]
    }
  }
};

let allSections = [];
let activeFilter = 'all';
let searchTerm = '';

function renderAll() {
  const tabsEl = document.getElementById('tabs');
  const gridEl = document.getElementById('grid');
  const keys = Object.keys(MOCK.sections);

  tabsEl.innerHTML = `<div class="tk-tab ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All</div>` +
    keys.map(k=>`<div class="tk-tab ${activeFilter===k?'active':''}" onclick="setFilter('${k}')">${k.replace(/_/g,' ')}</div>`).join('');

  const filtered = keys.filter(k => activeFilter==='all' || k===activeFilter);
  let html = '';
  let any = false;

  filtered.forEach((key, i) => {
    const sec = MOCK.sections[key];
    const icon = ICONS[i % ICONS.length];
    let links = [];

    ['tools','sites','forums'].forEach(t => {
      if(sec[t]) links.push(...sec[t].map(l=>({...l,cat:''})));
    });

    let catBlocks = '';
    if(sec.categories) {
      for(let cat in sec.categories) {
        let catLinks = sec.categories[cat];
        if(searchTerm) catLinks = catLinks.filter(l=>l.name.toLowerCase().includes(searchTerm));
        if(catLinks.length) {
          catBlocks += `<div class="tk-cat-label">${cat.replace(/_/g,' ')}</div>`;
          catBlocks += catLinks.map(l=>`<a class="tk-link" href="${l.url}" target="_blank"><span>${l.name}</span><span class="tk-link-arrow">&#8599;</span></a>`).join('');
        }
      }
    }

    ['games','movie_apps','search_methods'].forEach(t => {
      if(sec[t]) links.push(...sec[t].map(l=>({...l,cat:t.replace(/_/g,' ')})));
    });

    let filteredLinks = links;
    if(searchTerm) filteredLinks = links.filter(l=>l.name.toLowerCase().includes(searchTerm));

    const titleMatch = key.replace(/_/g,' ').toLowerCase().includes(searchTerm);
    if(!filteredLinks.length && !catBlocks && !titleMatch && searchTerm) return;

    any = true;
    html += `<div class="tk-card">
      <div class="tk-card-header">
        <div class="tk-card-icon ${icon.cls}">${icon.sym}</div>
        <div class="tk-card-title">${key.replace(/_/g,' ')}</div>
      </div>
      ${sec.description?`<div class="tk-card-desc">${sec.description}</div>`:''}
      <div class="tk-links">
        ${filteredLinks.map(l=>`<a class="tk-link" href="${l.url}" target="_blank"><span>${l.name}</span><span class="tk-link-arrow">&#8599;</span></a>`).join('')}
        ${catBlocks}
      </div>
    </div>`;
  });

  gridEl.innerHTML = any ? html : `<div class="tk-empty">No results found for "<strong>${searchTerm}</strong>"</div>`;
}

function setFilter(f) {
  activeFilter = f;
  renderAll();
}

document.getElementById('searchInput').addEventListener('input', function() {
  searchTerm = this.value.toLowerCase().trim();
  activeFilter = 'all';
  renderAll();
});

renderAll();
</script>
