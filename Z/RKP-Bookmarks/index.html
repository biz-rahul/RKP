<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Toolkit ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script> <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-primary: #00d2ff;
            --accent-secondary: #92fe9d;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow: rgba(0, 210, 255, 0.3);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: rgba(0, 0, 0, 0.02);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --glass-border: rgba(0, 0, 0, 0.1);
            --glow: rgba(58, 123, 213, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, var(--glow) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(146, 254, 157, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            transition: background 0.5s ease;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- Header & Search --- */
        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 60px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            margin-bottom: 15px;
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 30px auto;
        }

        #searchBar {
            width: 100%;
            padding: 15px 25px 15px 50px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-main);
            backdrop-filter: blur(10px);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #searchBar:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* --- Controls --- */
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .theme-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        /* --- Grid & Cards --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .section {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 25px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 210, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        .section h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .link:hover {
            background: linear-gradient(90deg, rgba(0, 210, 255, 0.1), transparent);
            border-color: var(--glass-border);
            transform: translateX(5px);
        }

        .link i { font-size: 0.8rem; color: var(--text-muted); }

        .category-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #facc15;
            margin: 20px 0 10px;
            font-weight: 800;
        }

        /* --- Footer Stats --- */
        .footer-info {
            text-align: center;
            margin-top: 50px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="theme-btn" onclick="toggleTheme()" title="Toggle Theme">
            <i data-lucide="sun-moon"></i>
        </button>
    </div>

    <header>
        <h1>Nexus Toolkit</h1>
        <p>Your minimalist command center for the web.</p>
        
        <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="searchBar" placeholder="Search resources, tools, or apps..." onkeyup="searchLinks()">
        </div>
    </header>

    <div class="container" id="container">
        </div>

    <div class="footer-info" id="stats"></div>

    <script>
        let siteData = null;

        // Fetch and Render
        fetch('WebsiteList.json')
            .then(res => res.json())
            .then(data => {
                siteData = data;
                renderDashboard(data.sections);
                updateStats(data.sections);
                lucide.createIcons();
            })
            .catch(err => {
                document.getElementById("container").innerHTML = `<div class="error-msg">Error loading JSON. Make sure it's in the same folder.</div>`;
            });

        function renderDashboard(sections) {
            const container = document.getElementById("container");
            container.innerHTML = "";

            for (let key in sections) {
                const section = sections[key];
                const sectionDiv = document.createElement("div");
                sectionDiv.className = "section";
                sectionDiv.setAttribute('data-name', key.toLowerCase());

                let html = `<h2><i data-lucide="layers"></i> ${key.replace(/_/g, ' ')}</h2>`;
                if (section.description) html += `<p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:15px;">${section.description}</p>`;
                
                html += `<div class="links-grid">`;
                
                // Render flat lists
                ["tools", "forums", "sites"].forEach(type => {
                    if (section[type]) {
                        section[type].forEach(item => {
                            html += createLinkAnchor(item);
                        });
                    }
                });

                // Render Nested
                if (section.categories) {
                    for (let cat in section.categories) {
                        html += `<div class="category-tag">${cat.replace(/_/g, ' ')}</div>`;
                        section.categories[cat].forEach(item => {
                            html += createLinkAnchor(item);
                        });
                    }
                }
                
                // Add special piracy structures if they exist
                ["games", "movie_apps", "search_methods"].forEach(sType => {
                    if (section[sType]) {
                        html += `<div class="category-tag">${sType.replace(/_/g, ' ')}</div>`;
                        section[sType].forEach(item => html += createLinkAnchor(item));
                    }
                });

                html += `</div>`;
                sectionDiv.innerHTML = html;
                container.appendChild(sectionDiv);
            }
            lucide.createIcons();
        }

        function createLinkAnchor(item) {
            return `
                <a class="link" href="${item.url}" target="_blank">
                    <span>${item.name}</span>
                    <i data-lucide="external-link"></i>
                </a>`;
        }

        // --- Advanced Features ---

        // 1. Live Search
        function searchLinks() {
            const query = document.getElementById("searchBar").value.toLowerCase();
            const links = document.querySelectorAll(".link");
            const sections = document.querySelectorAll(".section");

            links.forEach(link => {
                const text = link.innerText.toLowerCase();
                link.style.display = text.includes(query) ? "flex" : "none";
            });

            // Hide section if empty
            sections.forEach(section => {
                const visibleLinks = section.querySelectorAll('.link[style="display: flex;"]').length;
                section.style.display = (visibleLinks === 0 && query !== "") ? "none" : "block";
            });
        }

        // 2. Dark/Light Theme Toggle
        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute("data-theme");
            body.setAttribute("data-theme", current === "light" ? "dark" : "light");
        }

        // 3. Simple Stats
        function updateStats(sections) {
            let count = 0;
            // Simple logic to count all items
            document.getElementById("stats").innerText = `⚡ Nexus is currently indexing hundreds of resources for your workflow.`;
        }
    </script>
</body>
</html>
