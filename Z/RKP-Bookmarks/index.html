<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Toolkit</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

h1 {
  text-align: center;
  padding: 20px;
  color: #38bdf8;
}

.section {
  margin: 20px;
}

.section h2 {
  color: #facc15;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: #334155;
}

a {
  color: #38bdf8;
  text-decoration: none;
  font-weight: bold;
}
</style>

</head>
<body>

<h1>🔥 Ultimate Toolkit</h1>

<div id="container"></div>

<script>

const data = {
  sections: {
    CODING_DESIGN_TOOLS: {
      description: "UI, development, and design related tools",
      tools: [
        {name:"Jitter Video",url:"https://jitter.video/files/"},
        {name:"Figma",url:"https://www.figma.com/files/"},
        {name:"OneCompiler",url:"https://onecompiler.com/"},
        {name:"Neumorphism UI Generator",url:"https://neumorphism.io/#e0e0e0"},
        {name:"Uiverse",url:"https://uiverse.io/"}
      ]
    },

    GETTING_BORED: {
      description: "Timepass websites",
      sites: [
        {name:"The Useless Web",url:"https://theuselessweb.com/"},
        {name:"Neal.fun",url:"https://neal.fun/"},
        {name:"Akinator",url:"https://en.akinator.com/"}
      ]
    },

    IMPORTANT: {
      description: "Useful tools",
      tools: [
        {name:"Wayback Machine",url:"https://web.archive.org/"},
        {name:"VirusTotal",url:"https://www.virustotal.com/"},
        {name:"Speedtest",url:"https://www.speedtest.net/"}
      ]
    }
  }
};

const container = document.getElementById("container");

function createCards(items) {
  let html = '<div class="grid">';
  items.forEach(item => {
    html += `
      <div class="card">
        <a href="${item.url}" target="_blank">${item.name}</a>
      </div>
    `;
  });
  html += '</div>';
  return html;
}

for (let section in data.sections) {

  let sec = data.sections[section];

  let div = document.createElement("div");
  div.className = "section";

  div.innerHTML = `<h2>${section.replaceAll("_"," ")}</h2>
                   <p>${sec.description}</p>`;

  if (sec.tools) div.innerHTML += createCards(sec.tools);
  if (sec.sites) div.innerHTML += createCards(sec.sites);

  container.appendChild(div);
}

</script>

</body>
</html>
