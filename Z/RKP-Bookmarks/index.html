<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Toolkit | Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #38bdf8;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --yellow: #facc15;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            scroll-behavior: smooth;
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 20px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        h1 { font-family: 'Orbitron'; font-size: 1.8rem; margin: 0 0 15px 0; color: var(--accent); letter-spacing: 2px; }

        #searchBar {
            width: 80%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid var(--accent);
            background: #1e293b;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .stats { font-size: 0.8rem; margin-top: 10px; color: #94a3b8; }

        /* Nav Buttons */
        .nav-container { display: flex; justify-content: center; gap: 10px; padding: 15px; flex-wrap: wrap; background: #111827; }
        .nav-btn { background: #1e293b; color: white; border: 1px solid #334155; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .nav-btn:hover { background: var(--accent); color: #000; font-weight: bold; }
        .btn-bookmark-toggle { border-color: var(--yellow); color: var(--yellow); }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .section { margin-bottom: 40px; }
        h2 { border-left: 4px solid var(--accent); padding-left: 15px; font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }

        /* Card with Favicon Support */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent); background: #26334d; }

        .favicon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            border-radius: 4px;
            background: #334155; /* Fallback color */
        }

        .card a { color: white; text-decoration: none; font-weight: 600; flex-grow: 1; font-size: 0.95rem; }

        .bookmark-star { cursor: pointer; color: #475569; font-size: 1.2rem; margin-left: 10px; transition: 0.3s; }
        .bookmark-star.active { color: var(--yellow); }

        #bookmarks-section { display: none; background: rgba(250, 204, 21, 0.08); border: 1px dashed var(--yellow); border-radius: 15px; padding: 20px; margin-bottom: 30px; }
    </style>
</head>
<body>

<header>
    <h1>🔥 ULTIMATE TOOLKIT</h1>
    <input type="text" id="searchBar" placeholder="Search apps..." onkeyup="filterContent()">
    <div class="stats">Total: <span id="totalCount">0</span> | Saved: <span id="favCount">0</span></div>
</header>

<div class="nav-container">
    <button class="nav-btn btn-bookmark-toggle" onclick="toggleBookmarkSection()">⭐ Show Bookmarks</button>
    <button class="nav-btn" onclick="scrollToId('coding')">💻 Coding</button>
    <button class="nav-btn" onclick="scrollToId('hacking')">🛡️ Hacking</button>
    <button class="nav-btn" onclick="scrollToId('piracy')">🏴‍☠️ Piracy</button>
</div>

<div class="container">
    <div id="bookmarks-section" class="section">
        <h2 style="color: var(--yellow); border-color: var(--yellow);">YOUR FAVORITES</h2>
        <div id="bookmarks-grid" class="grid"></div>
    </div>

    <div class="section" id="coding">
        <h2>CODING & DESIGN</h2>
        <div class="grid">
            <div class="card" data-name="Jitter Video"><a href="https://jitter.video/" target="_blank">Jitter Video</a><span class="bookmark-star" onclick="toggleStar(this)">★</span></div>
            <div class="card" data-name="Figma"><a href="https://www.figma.com/" target="_blank">Figma</a><span class="bookmark-star" onclick="toggleStar(this)">★</span></div>
            <div class="card" data-name="Uiverse"><a href="https://uiverse.io/" target="_blank">Uiverse</a><span class="bookmark-star" onclick="toggleStar(this)">★</span></div>
            <div class="card" data-name="OneCompiler"><a href="https://onecompiler.com/" target="_blank">OneCompiler</a><span class="bookmark-star" onclick="toggleStar(this)">★</span></div>
        </div>
    </div>

    <div class="section" id="hacking">
        <h2>CYBER SECURITY</h2>
        <div class="grid">
            <div class="card" data-name="Hack Forums"><a href="https://hackforums.net/" target="_blank">Hack Forums</a><span class="bookmark-star" onclick="toggleStar(this)">★</span></div>
            <div class="card" data-name="Cracking.org"><a href="https://cracking.org/" target="_blank">Cracking.org</a><span class="bookmark-star" onclick="toggleStar(this)">★</span></div>
        </div>
    </div>
    
    </div>

<script>
    // 1. JS TO ADD FAVICONS AUTOMATICALLY
    function loadFavicons() {
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const link = card.querySelector('a').href;
            const domain = new URL(link).hostname;
            // Using Google's favicon service
            const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
            
            const img = document.createElement('img');
            img.src = faviconUrl;
            img.className = 'favicon';
            img.alt = 'icon';
            
            // Link ke pehle icon insert karein
            card.prepend(img);
        });
    }

    // Initialize favicons on load
    window.onload = () => {
        loadFavicons();
        document.getElementById('totalCount').innerText = document.querySelectorAll('.section:not(#bookmarks-section) .card').length;
    };

    function toggleBookmarkSection() {
        const section = document.getElementById('bookmarks-section');
        const btn = document.querySelector('.btn-bookmark-toggle');
        const isHidden = section.style.display === "none" || section.style.display === "";
        section.style.display = isHidden ? "block" : "none";
        btn.innerText = isHidden ? "✖ Hide Bookmarks" : "⭐ Show Bookmarks";
        if(isHidden) scrollToId('bookmarks-section');
    }

    function toggleStar(star) {
        star.classList.toggle('active');
        refreshBookmarks();
    }

    function refreshBookmarks() {
        const grid = document.getElementById('bookmarks-grid');
        grid.innerHTML = "";
        const activeStars = document.querySelectorAll('.section:not(#bookmarks-section) .bookmark-star.active');
        document.getElementById('favCount').innerText = activeStars.length;

        activeStars.forEach(star => {
            const cardClone = star.parentElement.cloneNode(true);
            cardClone.querySelector('.bookmark-star').onclick = function() {
                const name = this.parentElement.getAttribute('data-name');
                document.querySelector(`.section:not(#bookmarks-section) .card[data-name="${name}"] .bookmark-star`).classList.remove('active');
                refreshBookmarks();
            };
            grid.appendChild(cardClone);
        });
    }

    function filterContent() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        let cards = document.querySelectorAll('.section:not(#bookmarks-section) .card');
        cards.forEach(card => {
            let name = card.getAttribute('data-name').toLowerCase();
            card.style.display = name.includes(input) ? "flex" : "none";
        });
    }

    function scrollToId(id) { document.getElementById(id).scrollIntoView({behavior: "smooth"}); }
</script>

</body>
</html>
