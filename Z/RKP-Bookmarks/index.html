<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Toolkit Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #38bdf8;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            scroll-behavior: smooth;
        }

        /* Navbar & Search */
        header {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 20px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        h1 { font-family: 'Orbitron'; font-size: 1.8rem; margin: 0 0 15px 0; color: var(--accent); }

        #searchBar {
            width: 80%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid var(--accent);
            background: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .stats { font-size: 0.8rem; margin-top: 10px; color: #94a3b8; }

        /* Category Nav */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
            background: #111827;
        }

        .nav-btn {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .nav-btn:hover { background: var(--accent); color: black; }

        /* Main Content */
        .container { max-width: 1200px; margin: auto; padding: 20px; }

        .section { margin-bottom: 40px; }
        h2 { border-left: 4px solid var(--accent); padding-left: 10px; font-family: 'Orbitron'; font-size: 1.2rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        /* Card Style */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .card a { color: white; text-decoration: none; font-weight: bold; display: block; margin-right: 30px;}

        /* Bookmark Button */
        .bookmark-btn {
            position: absolute;
            right: 10px;
            top: 15px;
            cursor: pointer;
            color: #475569;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .bookmark-btn.active { color: #facc15; }

        /* Bookmark Section Special */
        #bookmarks-section { background: rgba(250, 204, 21, 0.05); border-radius: 15px; padding: 15px; display: none; }
    </style>
</head>
<body>

<header>
    <h1>🔥 ULTIMATE TOOLKIT</h1>
    <input type="text" id="searchBar" placeholder="Search apps or categories..." onkeyup="filterContent()">
    <div class="stats">Total Sites: <span id="totalCount">0</span> | Bookmarked: <span id="favCount">0</span></div>
</header>

<div class="nav-container">
    <button class="nav-btn" onclick="scrollToId('bookmarks-section')">⭐ Bookmarks</button>
    <button class="nav-btn" onclick="scrollToId('coding')">💻 Coding</button>
    <button class="nav-btn" onclick="scrollToId('hacking')">🛡️ Hacking</button>
    <button class="nav-btn" onclick="scrollToId('piracy')">🏴‍☠️ Piracy</button>
    <button class="nav-btn" onclick="scrollToId('osint')">🔍 OSINT</button>
</div>

<div class="container">
    
    <div id="bookmarks-section" class="section">
        <h2 style="color: #facc15;">⭐ SAVED BOOKMARKS</h2>
        <div id="bookmarks-grid" class="grid"></div>
    </div>

    <div class="section" id="coding">
        <h2>CODING DESIGN</h2>
        <div class="grid">
            <div class="card" data-name="Jitter Video"><a href="https://jitter.video/files/" target="_blank">Jitter Video</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
            <div class="card" data-name="Figma"><a href="https://www.figma.com/files/" target="_blank">Figma</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
            <div class="card" data-name="Uiverse"><a href="https://uiverse.io/" target="_blank">Uiverse</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
            <div class="card" data-name="Spline Design"><a href="https://app.spline.design/" target="_blank">Spline 3D</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
        </div>
    </div>

    <div class="section" id="hacking">
        <h2>HACKING FORUMS</h2>
        <div class="grid">
            <div class="card" data-name="Hack Forums"><a href="https://hackforums.net/" target="_blank">Hack Forums</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
            <div class="card" data-name="Cracking.org"><a href="https://cracking.org/" target="_blank">Cracking.org</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
            <div class="card" data-name="HacksNation"><a href="https://hacksnation.com/" target="_blank">HacksNation</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
        </div>
    </div>

    <div class="section" id="piracy">
        <h2>PIRACY & MOVIES</h2>
        <div class="grid">
            <div class="card" data-name="FitGirl Repacks"><a href="https://fitgirl-repacks.site/" target="_blank">FitGirl Repacks</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
            <div class="card" data-name="Steamrip"><a href="https://steamrip.com/" target="_blank">STEAMRIP</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
            <div class="card" data-name="MovieBox"><a href="https://www.moviesbox.com.co/" target="_blank">MovieBox</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
        </div>
    </div>

    <div class="section" id="osint">
        <h2>OSINT TOOLS</h2>
        <div class="grid">
            <div class="card" data-name="Yandex Images"><a href="https://yandex.com/images/" target="_blank">Yandex Images</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
            <div class="card" data-name="VirusTotal"><a href="https://www.virustotal.com/" target="_blank">VirusTotal</a><span class="bookmark-btn" onclick="toggleBookmark(this)">★</span></div>
        </div>
    </div>

</div>

<script>
    // 1. Total Count Calculation
    document.getElementById('totalCount').innerText = document.querySelectorAll('.card').length;

    // 2. Search Functionality
    function filterContent() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        let cards = document.querySelectorAll('.card');
        let sections = document.querySelectorAll('.section');

        cards.forEach(card => {
            let name = card.getAttribute('data-name').toLowerCase();
            card.style.display = name.includes(input) ? "block" : "none";
        });

        // Hide section if no cards visible
        sections.forEach(sec => {
            let visibleCards = sec.querySelectorAll('.card[style="display: block;"]');
            sec.style.display = (visibleCards.length > 0 || input === "") ? "block" : "none";
        });
    }

    // 3. Smooth Scroll
    function scrollToId(id) {
        document.getElementById(id).scrollIntoView({behavior: "smooth"});
    }

    // 4. Bookmark System
    function toggleBookmark(btn) {
        btn.classList.toggle('active');
        updateBookmarks();
    }

    function updateBookmarks() {
        const bookmarkedGrid = document.getElementById('bookmarks-grid');
        const bookmarkSection = document.getElementById('bookmarks-section');
        bookmarkedGrid.innerHTML = "";
        
        let actives = document.querySelectorAll('.bookmark-btn.active');
        document.getElementById('favCount').innerText = actives.length;

        if(actives.length > 0) {
            bookmarkSection.style.display = "block";
            actives.forEach(btn => {
                let cardClone = btn.parentElement.cloneNode(true);
                cardClone.querySelector('.bookmark-btn').onclick = function() {
                    // Find original and toggle it
                    let name = this.parentElement.getAttribute('data-name');
                    document.querySelectorAll(`.card[data-name="${name}"] .bookmark-btn`).forEach(b => b.classList.remove('active'));
                    updateBookmarks();
                };
                bookmarkedGrid.appendChild(cardClone);
            });
        } else {
            bookmarkSection.style.display = "none";
        }
    }
</script>

</body>
</html>
