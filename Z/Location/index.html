<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pink Spectrum</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>

<script>
    let t = 0;

    function generatePinkColor(time) {
        // Hue constrained to pink range (300°–360°)
        let hue = 300 + (time % 60);  

        // Oscillating saturation and lightness for variation
        let saturation = 60 + 40 * Math.abs(Math.sin(time * 0.2)); 
        let lightness = 70 + 20 * Math.abs(Math.cos(time * 0.3));

        return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    setInterval(() => {
        document.body.style.backgroundColor = generatePinkColor(t);
        t++;
    }, 500);
</script>

</body>
</html>
