<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LIGHTFORGE — Rahul Kumar Puri</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@300;400;600&display=swap');

  :root {
    --bg: #080a0d;
    --surface: #0d1117;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #ff2d78;
    --dim: #3a4a5a;
    --text: #c8d8e8;
    --text-dim: #4a6070;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    overflow-x: hidden;
  }

  /* ══════════════════════════════════
     DESKTOP LAYOUT (side by side)
  ══════════════════════════════════ */
  #app {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 100vh;
    width: 100vw;
    height: 100vh;
  }

  #left {
    display: flex;
    flex-direction: column;
    padding: 36px 44px;
    overflow-y: auto;
    gap: 28px;
    scrollbar-width: none;
  }
  #left::-webkit-scrollbar { display: none; }

  #right {
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 24px;
    gap: 18px;
    background: var(--surface);
    overflow-y: auto;
    scrollbar-width: none;
  }
  #right::-webkit-scrollbar { display: none; }

  /* ══════════════════════════════════
     MOBILE LAYOUT (stacked)
  ══════════════════════════════════ */
  @media (max-width: 680px) {
    html, body { overflow-y: auto; height: auto; }

    #app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: auto;
      min-height: 100vh;
    }

    #left {
      padding: 20px 16px;
      gap: 20px;
      overflow-y: visible;
      order: 1;
    }

    #right {
      border-left: none;
      border-top: 1px solid var(--border);
      padding: 18px 16px;
      gap: 14px;
      order: 2;
    }

    .logo { font-size: 36px; letter-spacing: 4px; }
    .byline { font-size: 9px; }

    .btn { font-size: 20px; padding: 14px 20px; min-width: 100px; }
    .btn-sm { font-size: 15px; padding: 10px 16px; }

    .effect-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .fx-btn { font-size: 10px; padding: 12px 6px; }
    .fx-icon { font-size: 16px; }

    .speed-row { gap: 6px; }
    .spd-btn { font-size: 11px; padding: 8px 8px; min-width: 48px; }

    .go-btn { font-size: 24px; padding: 18px; letter-spacing: 4px; }

    .terminal { min-height: 160px !important; max-height: 200px !important; }
    .preview-info { font-size: 10px; }
    .brand-sig { font-size: 9px; }
  }

  /* ── HEADER ── */
  .header { display: flex; flex-direction: column; gap: 4px; }
  .logo {
    font-family: var(--display);
    font-size: 52px;
    letter-spacing: 6px;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 40px rgba(0,229,255,0.4);
  }
  .logo span { color: var(--accent2); }
  .byline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── SECTION ── */
  .section {
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeIn 0.3s ease;
  }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    border-left: 2px solid var(--accent);
    padding-left: 10px;
    opacity: 0.7;
  }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    font-family: var(--display);
    font-size: 26px;
    letter-spacing: 3px;
    padding: 16px 32px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    flex: 1;
    min-width: 110px;
    text-align: center;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
    box-shadow: 0 0 30px rgba(0,229,255,0.35);
  }
  .btn-sm { font-size: 18px; padding: 11px 20px; letter-spacing: 2px; }

  /* ── EFFECT GRID ── */
  .effect-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .fx-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.2px;
    padding: 14px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.5;
    white-space: pre-line;
  }
  .fx-btn:hover { border-color: var(--accent); color: var(--accent); }
  .fx-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,45,120,0.08);
    box-shadow: 0 0 20px rgba(255,45,120,0.2);
  }
  .fx-icon { font-size: 18px; display: block; margin-bottom: 4px; }

  /* ── ROTATE OPTION ── */
  .rotate-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .rot-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 10px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    text-align: center;
    letter-spacing: 1.5px;
  }
  .rot-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rot-btn.active {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
  }

  /* ── SPEED ── */
  .speed-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .spd-btn {
    font-family: var(--mono);
    font-size: 12px;
    padding: 9px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    text-align: center;
    min-width: 55px;
  }
  .spd-btn:hover { border-color: var(--accent); color: var(--accent); }
  .spd-btn.active {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
  }

  /* ── GO BUTTON ── */
  .go-btn {
    font-family: var(--display);
    font-size: 30px;
    letter-spacing: 6px;
    padding: 20px 40px;
    background: linear-gradient(135deg, var(--accent2), #ff6b35);
    border: none;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 40px rgba(255,45,120,0.4);
    width: 100%;
  }
  .go-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 60px rgba(255,45,120,0.6); }
  .go-btn:active { transform: translateY(0); }

  /* ── PREVIEW PANEL ── */
  .preview-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .preview-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .terminal {
    border: 1px solid var(--border);
    background: #000;
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 200px;
    max-height: 320px;
  }
  .terminal-bar {
    background: #0d1117;
    border-bottom: 1px solid var(--border);
    padding: 7px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .terminal-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin: 0 auto;
    letter-spacing: 2px;
  }

  #preview-canvas {
    flex: 1;
    width: 100%;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  #preview-fx {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .preview-info {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    line-height: 2;
  }
  .preview-info span { color: var(--accent); }

  .brand-sig {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    text-transform: uppercase;
  }

  /* ── FULLSCREEN OVERLAY ── */
  #fs-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
  }
  #fs-overlay.active { display: flex; }
  #fs-left  { flex: 1; position: relative; }
  #fs-right { flex: 1; background: #000; }
  #fs-left.full  { flex: none; width: 100%; }
  #fs-right.full { display: none; }
  #fs-fx { width: 100%; height: 100%; position: relative; overflow: hidden; }

  #fs-escape {
    position: fixed;
    top: 16px; right: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    z-index: 10000;
    pointer-events: none;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── EFFECT STYLES ── */

  /* 1. Gradient Glow */
  @keyframes gradGlow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .fx-gradient-glow {
    background: linear-gradient(135deg,#ff0044,#aa00ff,#0055ff,#00ccff,#aa00ff,#ff0044);
    background-size: 400% 400%;
    animation: gradGlow var(--spd,4s) ease infinite;
  }

  /* 2. White */
  .fx-white { background: #ffffff; }

  /* 3. Red */
  .fx-red { background: #ff0000; }

  /* 4. Flash Pulse */
  @keyframes flashPulse {
    0%,45%,55%,100% { background:#000; }
    48%,52% { background:#fff; }
  }
  .fx-flash { animation: flashPulse var(--spd,1s) step-end infinite; }

  /* 5. RGB Cycle */
  @keyframes rgbCycle {
    0%  { background:#ff0000; }
    16% { background:#ff8800; }
    33% { background:#00ff44; }
    50% { background:#00ccff; }
    66% { background:#0033ff; }
    83% { background:#aa00ff; }
    100%{ background:#ff0000; }
  }
  .fx-rgb { animation: rgbCycle var(--spd,3s) linear infinite; }

  /* 6. Window Light — Vertical bars (default) */
  .fx-window {
    background: #000;
    position: relative;
    overflow: hidden;
  }
  .fx-window::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      rgba(255,255,200,0) 0px,
      rgba(255,255,200,0) 20px,
      rgba(255,255,200,0.92) 22px,
      rgba(255,255,200,0.92) 36px,
      rgba(255,255,200,0) 38px,
      rgba(255,255,200,0) 60px
    );
    animation: windowShiftH var(--spd,6s) ease-in-out infinite alternate;
  }
  @keyframes windowShiftH {
    from { transform: translateX(-30px); }
    to   { transform: translateX(30px); }
  }

  /* Window Light — Horizontal bars (rotated) */
  .fx-window.rotated::before {
    background: repeating-linear-gradient(
      180deg,
      rgba(255,255,200,0) 0px,
      rgba(255,255,200,0) 20px,
      rgba(255,255,200,0.92) 22px,
      rgba(255,255,200,0.92) 36px,
      rgba(255,255,200,0) 38px,
      rgba(255,255,200,0) 60px
    );
    animation: windowShiftV var(--spd,6s) ease-in-out infinite alternate;
  }
  @keyframes windowShiftV {
    from { transform: translateY(-30px); }
    to   { transform: translateY(30px); }
  }

  /* 7. Hacker */
  .fx-hacker { background: #000; overflow: hidden; }
  .hacker-text {
    position: absolute;
    inset: 0;
    font-family: var(--mono);
    font-size: 11px;
    color: #00ff41;
    overflow: hidden;
    padding: 4px;
    line-height: 1.4;
    word-break: break-all;
    white-space: pre-wrap;
  }

  /* 8. Glitch */
  @keyframes glitch1 {
    0%,100% { clip-path:inset(0 0 95% 0); transform:translate(-4px,0); }
    20%     { clip-path:inset(30% 0 50% 0); transform:translate(4px,0); }
    40%     { clip-path:inset(70% 0 10% 0); transform:translate(-2px,0); }
    60%     { clip-path:inset(10% 0 80% 0); transform:translate(3px,0); }
    80%     { clip-path:inset(50% 0 30% 0); transform:translate(-3px,0); }
  }
  @keyframes glitch2 {
    0%,100% { clip-path:inset(60% 0 20% 0); transform:translate(4px,0); background:#0ff; }
    25%     { clip-path:inset(20% 0 60% 0); transform:translate(-4px,0); background:#f0f; }
    50%     { clip-path:inset(80% 0 5% 0);  transform:translate(2px,0);  background:#ff0; }
    75%     { clip-path:inset(5% 0 80% 0);  transform:translate(-3px,0); background:#0ff; }
  }
  .fx-glitch { position:relative; background:#111; }
  .fx-glitch::before, .fx-glitch::after {
    content:''; position:absolute; inset:0; background:inherit;
  }
  .fx-glitch::before { animation:glitch1 var(--spd,0.4s) infinite steps(1); background:rgba(255,0,0,0.8); }
  .fx-glitch::after  { animation:glitch2 var(--spd,0.4s) infinite steps(1); }

  /* 9. Multi Color */
  @keyframes multiColor {
    0%  { background:#ff0055; }
    11% { background:#ff6600; }
    22% { background:#ffdd00; }
    33% { background:#33ff66; }
    44% { background:#00ffdd; }
    55% { background:#0099ff; }
    66% { background:#6600ff; }
    77% { background:#ff00aa; }
    88% { background:#ff3300; }
    100%{ background:#ff0055; }
  }
  .fx-multi { animation:multiColor var(--spd,5s) linear infinite; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="app">

  <!-- ══ LEFT / TOP — CONTROLS ══ -->
  <div id="left">
    <div class="header">
      <div class="logo">LIGHT<span>FORGE</span></div>
      <div class="byline">// real-time video lighting system</div>
    </div>

    <!-- STEP 1: MODE -->
    <div class="section" id="sec-mode">
      <div class="section-label">01 — Select Mode</div>
      <div class="btn-row">
        <button class="btn" id="btn-full" onclick="selectMode('full')">FULL</button>
        <button class="btn" id="btn-half" onclick="selectMode('half')">HALF</button>
      </div>
    </div>

    <!-- STEP 2: HALF SIDE -->
    <div class="section hidden" id="sec-side">
      <div class="section-label">02 — Black Side</div>
      <div class="btn-row">
        <button class="btn btn-sm" id="btn-left"  onclick="selectSide('left')">LEFT BLACK</button>
        <button class="btn btn-sm" id="btn-right" onclick="selectSide('right')">RIGHT BLACK</button>
      </div>
    </div>

    <!-- STEP 3: EFFECT -->
    <div class="section hidden" id="sec-effect">
      <div class="section-label">03 — Select Effect</div>
      <div class="effect-grid">
        <button class="fx-btn" onclick="selectEffect('gradient-glow')">
          <span class="fx-icon">◈</span>GRADIENT<br>GLOW
        </button>
        <button class="fx-btn" onclick="selectEffect('white')">
          <span class="fx-icon">□</span>WHITE<br>SCREEN
        </button>
        <button class="fx-btn" onclick="selectEffect('red')">
          <span class="fx-icon">◉</span>RED<br>SCREEN
        </button>
        <button class="fx-btn" onclick="selectEffect('flash')">
          <span class="fx-icon">⚡</span>FLASH<br>PULSE
        </button>
        <button class="fx-btn" onclick="selectEffect('rgb')">
          <span class="fx-icon">◐</span>RGB<br>CYCLE
        </button>
        <button class="fx-btn" onclick="selectEffect('window')">
          <span class="fx-icon">▦</span>WINDOW<br>LIGHT
        </button>
        <button class="fx-btn" onclick="selectEffect('hacker')">
          <span class="fx-icon">▶</span>HACKER<br>MODE
        </button>
        <button class="fx-btn" onclick="selectEffect('glitch')">
          <span class="fx-icon">▓</span>GLITCH<br>MODE
        </button>
        <button class="fx-btn" onclick="selectEffect('multi')">
          <span class="fx-icon">◑</span>MULTI<br>COLOR
        </button>
      </div>
    </div>

    <!-- WINDOW ROTATE OPTION -->
    <div class="section hidden" id="sec-rotate">
      <div class="section-label">↻ — Bar Direction</div>
      <div class="rotate-row">
        <button class="rot-btn active" id="rot-vertical"   onclick="selectRotate('vertical')">▦ VERTICAL BARS</button>
        <button class="rot-btn"        id="rot-horizontal" onclick="selectRotate('horizontal')">▤ HORIZONTAL BARS</button>
      </div>
    </div>

    <!-- STEP 4: SPEED -->
    <div class="section hidden" id="sec-speed">
      <div class="section-label">04 — Speed</div>
      <div class="speed-row">
        <button class="spd-btn"        onclick="selectSpeed(0.25)">0.25×</button>
        <button class="spd-btn"        onclick="selectSpeed(0.50)">0.50×</button>
        <button class="spd-btn"        onclick="selectSpeed(0.75)">0.75×</button>
        <button class="spd-btn active" onclick="selectSpeed(1.0)">1.0×</button>
        <button class="spd-btn"        onclick="selectSpeed(1.25)">1.25×</button>
        <button class="spd-btn"        onclick="selectSpeed(1.50)">1.50×</button>
        <button class="spd-btn"        onclick="selectSpeed(1.75)">1.75×</button>
        <button class="spd-btn"        onclick="selectSpeed(2.0)">2.0×</button>
      </div>
    </div>

    <!-- STEP 5: GO -->
    <div class="section hidden" id="sec-go">
      <button class="go-btn" onclick="goFullscreen()">▶ GO FULLSCREEN</button>
    </div>
  </div>

  <!-- ══ RIGHT / BOTTOM — PREVIEW ══ -->
  <div id="right">
    <div class="preview-label">Live Preview</div>

    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <div class="terminal-title">lightforge.preview</div>
      </div>
      <div id="preview-canvas">
        <div id="preview-fx"></div>
      </div>
    </div>

    <div class="preview-info">
      MODE:&nbsp;&nbsp; <span id="info-mode">—</span><br>
      EFFECT: <span id="info-effect">—</span><br>
      DIR:&nbsp;&nbsp;&nbsp; <span id="info-dir">—</span><br>
      SPEED:&nbsp; <span id="info-speed">1.0×</span>
    </div>

    <div class="brand-sig">✦ Created by Rahul Kumar Puri ✦</div>
  </div>

</div>

<!-- ══ FULLSCREEN OVERLAY ══ -->
<div id="fs-overlay">
  <div id="fs-left"><div id="fs-fx"></div></div>
  <div id="fs-right"></div>
  <div id="fs-escape">[ ESC / TAP ] EXIT</div>
</div>

<script>
  const state = {
    mode:   null,
    side:   null,
    effect: null,
    speed:  1.0,
    windowDir: 'vertical', // 'vertical' | 'horizontal'
  };

  const staticEffects = new Set(['white', 'red', 'hacker']);
  // Window now has speed control (it animates)

  const baseDurations = {
    'gradient-glow': 4,
    'flash':  1,
    'rgb':    3,
    'glitch': 0.4,
    'multi':  5,
    'window': 6,
  };

  // ── HELPERS ──
  function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
  function hide(id) { document.getElementById(id)?.classList.add('hidden'); }

  // ── STEP 1: MODE ──
  function selectMode(m) {
    state.mode = m;
    document.getElementById('btn-full').classList.toggle('active', m === 'full');
    document.getElementById('btn-half').classList.toggle('active', m === 'half');
    document.getElementById('info-mode').textContent = m.toUpperCase();

    if (m === 'half') {
      show('sec-side');
      if (!state.side) { hide('sec-effect'); hide('sec-rotate'); hide('sec-speed'); hide('sec-go'); }
    } else {
      hide('sec-side');
      state.side = null;
      show('sec-effect');
    }
    updatePreview();
  }

  // ── STEP 2: SIDE ──
  function selectSide(s) {
    state.side = s;
    document.getElementById('btn-left').classList.toggle('active',  s === 'left');
    document.getElementById('btn-right').classList.toggle('active', s === 'right');
    show('sec-effect');
    updatePreview();
  }

  // ── STEP 3: EFFECT ──
  function selectEffect(fx) {
    state.effect = fx;

    document.querySelectorAll('.fx-btn').forEach(b => b.classList.remove('active'));
    const fxNames = ['gradient-glow','white','red','flash','rgb','window','hacker','glitch','multi'];
    const idx = fxNames.indexOf(fx);
    if (idx >= 0) document.querySelectorAll('.fx-btn')[idx].classList.add('active');

    document.getElementById('info-effect').textContent = fx.toUpperCase().replace('-',' ');

    // Show rotate only for window
    if (fx === 'window') {
      show('sec-rotate');
    } else {
      hide('sec-rotate');
    }

    // Speed: hide for static, show for animated
    if (staticEffects.has(fx)) {
      hide('sec-speed');
    } else {
      show('sec-speed');
    }

    show('sec-go');
    updatePreview();
  }

  // ── WINDOW ROTATE ──
  function selectRotate(dir) {
    state.windowDir = dir;
    document.getElementById('rot-vertical').classList.toggle('active',   dir === 'vertical');
    document.getElementById('rot-horizontal').classList.toggle('active', dir === 'horizontal');
    document.getElementById('info-dir').textContent = dir.toUpperCase();
    updatePreview();

    // Live-update fullscreen if active
    const fsFx = document.getElementById('fs-fx');
    if (document.getElementById('fs-overlay').classList.contains('active') && state.effect === 'window') {
      fsFx.classList.toggle('rotated', dir === 'horizontal');
    }
  }

  // ── STEP 4: SPEED ──
  function selectSpeed(s) {
    state.speed = s;
    document.getElementById('info-speed').textContent = s + '×';
    document.querySelectorAll('.spd-btn').forEach(b => {
      b.classList.toggle('active', parseFloat(b.textContent) === s);
    });
    updatePreview();

    // Live-update fullscreen
    if (document.getElementById('fs-overlay').classList.contains('active') && state.effect) {
      applyEffect(document.getElementById('fs-fx'), state.effect, state.speed);
    }
  }

  // ── APPLY EFFECT ──
  let hackerTimers = [];
  const chars = '01アイウエオカキクケコサシスセソタチツテトナ!@#$%^&*><{}[]\\|';

  function applyEffect(el, effect, speed) {
    // Strip old fx classes but keep 'rotated' handling separately
    el.className = '';
    el.innerHTML = '';

    const base = baseDurations[effect];
    const dur  = base ? (base / speed).toFixed(2) + 's' : '3s';
    el.style.setProperty('--spd', dur);
    el.style.background = '';

    el.classList.add('fx-' + effect);

    if (effect === 'window' && state.windowDir === 'horizontal') {
      el.classList.add('rotated');
    }

    if (effect === 'hacker') {
      el.style.background = '#000';
      startHacker(el, speed);
    }
  }

  function startHacker(el, speed) {
    hackerTimers.forEach(clearInterval);
    hackerTimers = [];

    const div = document.createElement('div');
    div.className = 'hacker-text';
    el.appendChild(div);

    const cols = Math.floor((el.offsetWidth  || 200) / 7);
    const rows = Math.floor((el.offsetHeight || 160) / 15);

    function rndLine() {
      let l = '';
      for (let i = 0; i < cols; i++) l += chars[Math.floor(Math.random() * chars.length)];
      return l;
    }
    function update() {
      let out = '';
      for (let r = 0; r < rows; r++) out += rndLine() + '\n';
      div.textContent = out;
    }
    const t = setInterval(update, Math.max(40, 120 / speed));
    hackerTimers.push(t);
    update();
  }

  // ── LIVE PREVIEW ──
  function updatePreview() {
    const fxEl = document.getElementById('preview-fx');
    fxEl.className = '';
    fxEl.innerHTML = '';
    fxEl.style.cssText = 'position:absolute; inset:0; width:100%; height:100%;';
    hackerTimers.forEach(clearInterval);
    hackerTimers = [];

    if (!state.effect) return;

    // Half mode positioning
    if (state.mode === 'half' && state.side) {
      fxEl.style.left   = state.side === 'left' ? '50%' : '0';
      fxEl.style.width  = '50%';
      fxEl.style.height = '100%';
      fxEl.style.top    = '0';
    }

    applyEffect(fxEl, state.effect, state.speed);
    document.getElementById('info-dir').textContent =
      state.effect === 'window' ? state.windowDir.toUpperCase() : '—';
  }

  // ── FULLSCREEN ──
  function goFullscreen() {
    if (!state.effect) return;

    const overlay = document.getElementById('fs-overlay');
    const fsLeft  = document.getElementById('fs-left');
    const fsRight = document.getElementById('fs-right');
    const fsFx    = document.getElementById('fs-fx');

    overlay.classList.add('active');

    if (state.mode === 'full') {
      fsLeft.style.cssText  = 'flex:1; width:100%; position:relative;';
      fsRight.style.display = 'none';
      fsFx.style.cssText    = 'width:100%; height:100%; position:relative; overflow:hidden;';
    } else {
      fsRight.style.display = 'block';
      if (state.side === 'left') {
        fsLeft.style.cssText  = 'flex:1; background:#000; position:relative;';
        fsRight.style.cssText = 'flex:1; position:relative;';
        fsFx.style.cssText    = 'width:100%; height:100%; position:relative; overflow:hidden;';
        fsRight.innerHTML = '';
        fsRight.appendChild(fsFx);
      } else {
        fsLeft.style.cssText  = 'flex:1; position:relative;';
        fsRight.style.cssText = 'flex:1; background:#000; position:relative;';
        fsFx.style.cssText    = 'width:100%; height:100%; position:relative; overflow:hidden;';
        fsLeft.innerHTML = '';
        fsLeft.appendChild(fsFx);
      }
    }

    applyEffect(fsFx, state.effect, state.speed);
    document.documentElement.requestFullscreen?.().catch(() => {});
  }

  function exitFs() {
    const overlay = document.getElementById('fs-overlay');
    if (!overlay.classList.contains('active')) return;
    overlay.classList.remove('active');

    const fsLeft  = document.getElementById('fs-left');
    const fsRight = document.getElementById('fs-right');
    const fsFx    = document.getElementById('fs-fx');

    // Restore fsFx to fsLeft
    fsLeft.innerHTML = '';
    fsLeft.appendChild(fsFx);
    fsLeft.style.cssText  = 'flex:1; position:relative;';
    fsRight.style.cssText = 'flex:1;';
    fsFx.className = '';
    fsFx.innerHTML = '';
    fsFx.style.cssText = 'width:100%; height:100%; position:relative; overflow:hidden;';

    hackerTimers.forEach(clearInterval);
    hackerTimers = [];

    document.exitFullscreen?.().catch(() => {});
  }

  // Tap anywhere on fullscreen to exit (mobile)
  document.getElementById('fs-overlay').addEventListener('click', exitFs);

  document.addEventListener('keydown', e => { if (e.key === 'Escape') exitFs(); });
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) exitFs();
  });
</script>
</body>
</html>
