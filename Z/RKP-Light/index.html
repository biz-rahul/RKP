<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LIGHTFORGE — Rahul Kumar Puri</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@300;400;600&display=swap');

  :root {
    --bg: #080a0d;
    --surface: #0d1117;
    --border: #1e2d3d;
    --accent: #00e5ff;
    --accent2: #ff2d78;
    --dim: #3a4a5a;
    --text: #c8d8e8;
    --text-dim: #4a6070;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    overflow: hidden;
  }

  /* ═══════════════════════════════════════
     DESKTOP: side-by-side (controls | preview)
  ═══════════════════════════════════════ */
  #app {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 100vh;
    width: 100vw;
    height: 100vh;
  }

  #left {
    display: flex;
    flex-direction: column;
    padding: 36px 44px;
    overflow-y: auto;
    gap: 28px;
    scrollbar-width: none;
    order: 1;
  }
  #left::-webkit-scrollbar { display: none; }

  #right {
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 24px;
    gap: 18px;
    background: var(--surface);
    order: 2;
  }

  /* ═══════════════════════════════════════
     MOBILE: top controls, bottom preview
  ═══════════════════════════════════════ */
  @media (max-width: 700px) {
    html, body { overflow: hidden; }

    #app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
      height: 100dvh;
    }

    #left {
      order: 1;
      padding: 14px 14px 10px;
      gap: 16px;
      overflow-y: auto;
    }

    #right {
      order: 2;
      border-left: none;
      border-top: 1px solid var(--border);
      padding: 12px 14px 14px;
      gap: 9px;
      flex-shrink: 0;
    }

    .logo   { font-size: 34px; letter-spacing: 3px; }
    .byline { font-size: 9px;  letter-spacing: 2px; }

    .btn    { font-size: 20px; padding: 13px 18px; min-width: 80px; }
    .btn-sm { font-size: 14px; padding: 10px 12px; }

    .effect-grid { gap: 7px; }
    .fx-btn  { font-size: 10px; padding: 11px 5px; }
    .fx-icon { font-size: 14px; margin-bottom: 3px; }

    .speed-row { gap: 5px; }
    .spd-btn   { font-size: 10px; padding: 7px 6px; min-width: 40px; }

    .go-btn { font-size: 22px; padding: 15px; letter-spacing: 4px; }

    .terminal { min-height: 100px !important; max-height: 130px !important; }
    .preview-info {
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: 9px; line-height: 1.6;
    }
    .brand-sig { font-size: 8px; padding-top: 8px; }
    .section-label { font-size: 9px; letter-spacing: 3px; }
    .rotate-row { gap: 8px; }
    .toggle-btn { font-size: 10px; padding: 8px 14px; }
  }

  /* ── HEADER ── */
  .header { display: flex; flex-direction: column; gap: 3px; }
  .logo {
    font-family: var(--display);
    font-size: 50px;
    letter-spacing: 6px;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 40px rgba(0,229,255,0.4);
  }
  .logo span { color: var(--accent2); }
  .byline {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── SECTION ── */
  .section {
    display: flex;
    flex-direction: column;
    gap: 11px;
    animation: fadeIn 0.3s ease;
  }
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    border-left: 2px solid var(--accent);
    padding-left: 10px;
    opacity: 0.7;
  }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    font-family: var(--display);
    font-size: 26px;
    letter-spacing: 3px;
    padding: 16px 32px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    min-width: 120px;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover, .btn:active { border-color: var(--accent); color: var(--accent); }
  .btn.active {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
    box-shadow: 0 0 26px rgba(0,229,255,0.35);
  }
  .btn-sm { font-size: 17px; padding: 11px 20px; letter-spacing: 2px; }

  /* ── EFFECT GRID ── */
  .effect-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
  }
  .fx-btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 14px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.5;
    white-space: pre-line;
    -webkit-tap-highlight-color: transparent;
  }
  .fx-btn:hover, .fx-btn:active { border-color: var(--accent); color: var(--accent); }
  .fx-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,45,120,0.08);
    box-shadow: 0 0 16px rgba(255,45,120,0.2);
  }
  .fx-icon { font-size: 17px; display: block; margin-bottom: 4px; }

  /* ── ROTATE TOGGLE ── */
  .rotate-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .toggle-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 9px 18px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 2px;
    flex: 1;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-btn:hover, .toggle-btn:active { border-color: var(--accent); color: var(--accent); }
  .toggle-btn.active {
    border-color: var(--accent);
    color: var(--bg);
    background: var(--accent);
  }

  /* ── SPEED ── */
  .speed-row { display: flex; gap: 7px; flex-wrap: wrap; }
  .spd-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    text-align: center;
    min-width: 52px;
    -webkit-tap-highlight-color: transparent;
  }
  .spd-btn:hover, .spd-btn:active { border-color: var(--accent); color: var(--accent); }
  .spd-btn.active { border-color: var(--accent); color: var(--bg); background: var(--accent); }

  /* ── GO BUTTON ── */
  .go-btn {
    font-family: var(--display);
    font-size: 30px;
    letter-spacing: 5px;
    padding: 20px;
    background: linear-gradient(135deg, var(--accent2), #ff6b35);
    border: none;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 0 36px rgba(255,45,120,0.4);
    width: 100%;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .go-btn:active { transform: scale(0.97); }

  /* ── PREVIEW PANEL ── */
  .preview-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .preview-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .terminal {
    border: 1px solid var(--border);
    background: #000;
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 190px;
    max-height: 310px;
  }
  .terminal-bar {
    background: #0d1117;
    border-bottom: 1px solid var(--border);
    padding: 7px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  .terminal-title {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    margin: 0 auto;
    letter-spacing: 2px;
  }

  #preview-canvas {
    flex: 1;
    width: 100%;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  #preview-fx {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .preview-info {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    line-height: 2;
  }
  .preview-info span { color: var(--accent); }

  .brand-sig {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    text-transform: uppercase;
  }

  /* ── FULLSCREEN ── */
  #fs-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
  }
  #fs-overlay.active { display: flex; }
  #fs-left  { flex: 1; overflow: hidden; position: relative; }
  #fs-right { flex: 1; background: #000; }
  #fs-fx    { width: 100%; height: 100%; position: relative; overflow: hidden; }

  #fs-escape {
    position: fixed;
    top: 16px; right: 18px;
    font-family: var(--mono);
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 2px;
    z-index: 10000;
    pointer-events: none;
  }

  /* ═══════════ ANIMATIONS ═══════════ */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0; }
  }

  /* ═══════════ EFFECTS ═══════════ */

  /* 1. Gradient Glow */
  @keyframes gradGlow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .fx-gradient-glow {
    background: linear-gradient(135deg, #ff0044, #aa00ff, #0055ff, #00ccff, #aa00ff, #ff0044);
    background-size: 400% 400%;
    animation: gradGlow var(--spd, 4s) ease infinite;
  }

  /* 2. White */
  .fx-white { background: #ffffff; }

  /* 3. Red */
  .fx-red { background: #8B0000; }

  /* 4. Flash Pulse */
  @keyframes flashPulse {
    0%, 45%, 55%, 100% { background: #000; }
    48%, 52% { background: #fff; }
  }
  .fx-flash { animation: flashPulse var(--spd, 1s) step-end infinite; }

  /* 5. RGB Cycle */
  @keyframes rgbCycle {
    0%   { background: #ff0000; }
    16%  { background: #ff8800; }
    33%  { background: #00ff44; }
    50%  { background: #00ccff; }
    66%  { background: #0033ff; }
    83%  { background: #aa00ff; }
    100% { background: #ff0000; }
  }
  .fx-rgb { animation: rgbCycle var(--spd, 3s) linear infinite; }

  /* 6. Window Light — VERTICAL (default) */
  .fx-window {
    background: #000;
    position: relative;
    overflow: hidden;
  }
  .fx-window::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      rgba(255,255,200,0)    0px,
      rgba(255,255,200,0)    20px,
      rgba(255,255,200,0.92) 22px,
      rgba(255,255,200,0.92) 38px,
      rgba(255,255,200,0)    40px,
      rgba(255,255,200,0)    62px
    );
    animation: winV 6s ease-in-out infinite alternate;
  }
  @keyframes winV {
    from { transform: translateX(-30px); }
    to   { transform: translateX(30px); }
  }

  /* 6. Window Light — HORIZONTAL (rotated) */
  .fx-window.rotated::before {
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,200,0)    0px,
      rgba(255,255,200,0)    20px,
      rgba(255,255,200,0.92) 22px,
      rgba(255,255,200,0.92) 38px,
      rgba(255,255,200,0)    40px,
      rgba(255,255,200,0)    62px
    );
    animation: winH 6s ease-in-out infinite alternate;
  }
  @keyframes winH {
    from { transform: translateY(-30px); }
    to   { transform: translateY(30px); }
  }

  /* 7. Hacker */
  .fx-hacker { background: #000; overflow: hidden; }
  .hacker-text {
    position: absolute;
    inset: 0;
    font-family: var(--mono);
    font-size: 11px;
    color: #00ff41;
    padding: 4px;
    line-height: 1.4;
    word-break: break-all;
    white-space: pre-wrap;
    overflow: hidden;
  }

  /* 8. Glitch */
  @keyframes glitch1 {
    0%,100% { clip-path: inset(0 0 95% 0);  transform: translate(-4px,0); }
    20%     { clip-path: inset(30% 0 50% 0); transform: translate(4px,0); }
    40%     { clip-path: inset(70% 0 10% 0); transform: translate(-2px,0); }
    60%     { clip-path: inset(10% 0 80% 0); transform: translate(3px,0); }
    80%     { clip-path: inset(50% 0 30% 0); transform: translate(-3px,0); }
  }
  @keyframes glitch2 {
    0%,100% { clip-path: inset(60% 0 20% 0); transform: translate(4px,0);  background: rgba(0,255,255,0.7); }
    25%     { clip-path: inset(20% 0 60% 0); transform: translate(-4px,0); background: rgba(255,0,255,0.7); }
    50%     { clip-path: inset(80% 0 5%  0); transform: translate(2px,0);  background: rgba(255,255,0,0.7); }
    75%     { clip-path: inset(5%  0 80% 0); transform: translate(-3px,0); background: rgba(0,255,255,0.7); }
  }
  .fx-glitch { position: relative; background: #111; }
  .fx-glitch::before, .fx-glitch::after {
    content: ''; position: absolute; inset: 0; background: #111;
  }
  .fx-glitch::before { animation: glitch1 var(--spd, 0.4s) infinite steps(1); background: rgba(255,0,0,0.8); }
  .fx-glitch::after  { animation: glitch2 var(--spd, 0.4s) infinite steps(1); }

 /* 10. HYPNOTIC CIRCLE */
@keyframes hypnoSpin {
  from { transform: rotate(0deg) scale(1); }
  to   { transform: rotate(360deg) scale(1.05); }
}

.fx-hypno {
  background: radial-gradient(circle at center, #000 20%, #fff 21%, #000 22%, #fff 23%, #000 24%);
  background-size: 20px 20px;
  position: relative;
  overflow: hidden;
}

.fx-hypno::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: repeating-radial-gradient(
    circle,
    #000 0px,
    #000 10px,
    #fff 10px,
    #fff 20px
  );
  animation: hypnoSpin var(--spd, 3s) linear infinite;
}
</style>
</head>
<body>

<div id="app">

  <!-- ══ TOP / LEFT — CONTROLS ══ -->
  <div id="left">

    <div class="header">
      <div class="logo">LIGHT<span>FORGE</span></div>
      <div class="byline">// real-time video lighting system</div>
    </div>

    <!-- 01: MODE -->
    <div class="section" id="sec-mode">
      <div class="section-label">01 — Select Mode</div>
      <div class="btn-row">
        <button class="btn" id="btn-full" onclick="selectMode('full')">FULL</button>
        <button class="btn" id="btn-half" onclick="selectMode('half')">HALF</button>
      </div>
    </div>

    <!-- 02: BLACK SIDE (half only) -->
    <div class="section hidden" id="sec-side">
      <div class="section-label">02 — Black Side</div>
      <div class="btn-row">
        <button class="btn btn-sm" id="btn-left"  onclick="selectSide('left')">LEFT BLACK</button>
        <button class="btn btn-sm" id="btn-right" onclick="selectSide('right')">RIGHT BLACK</button>
      </div>
    </div>

    <!-- 03: EFFECT -->
    <div class="section hidden" id="sec-effect">
      <div class="section-label">03 — Select Effect</div>
      <div class="effect-grid">
        <button class="fx-btn" onclick="selectEffect('gradient-glow')"><span class="fx-icon">◈</span>GRADIENT&#10;GLOW</button>
        <button class="fx-btn" onclick="selectEffect('white')"><span class="fx-icon">□</span>WHITE&#10;SCREEN</button>
        <button class="fx-btn" onclick="selectEffect('red')"><span class="fx-icon">◉</span>RED&#10;SCREEN</button>
        <button class="fx-btn" onclick="selectEffect('flash')"><span class="fx-icon">⚡</span>FLASH&#10;PULSE</button>
        <button class="fx-btn" onclick="selectEffect('rgb')"><span class="fx-icon">◐</span>RGB&#10;CYCLE</button>
        <button class="fx-btn" onclick="selectEffect('window')"><span class="fx-icon">▦</span>WINDOW&#10;LIGHT</button>
        <button class="fx-btn" onclick="selectEffect('hacker')"><span class="fx-icon">></span>HACKER&#10;MODE</button>
        <button class="fx-btn" onclick="selectEffect('glitch')"><span class="fx-icon">▓</span>GLITCH&#10;MODE</button>
       <button class="fx-btn" onclick="selectEffect('hypno')"> <span class="fx-icon">◎</span>HYPNO&#10;CIRCLE</button>
      </div>
    </div>

    <!-- WINDOW ROTATE (only when window selected) -->
    <div class="section hidden" id="sec-rotate">
      <div class="section-label">↺ — Bar Direction</div>
      <div class="rotate-row">
        <button class="toggle-btn active" id="rot-v" onclick="setWindowRotate(false)">▐ VERTICAL</button>
        <button class="toggle-btn"        id="rot-h" onclick="setWindowRotate(true)">▬ HORIZONTAL</button>
      </div>
    </div>

    <!-- 04: SPEED -->
    <div class="section hidden" id="sec-speed">
      <div class="section-label">04 — Speed</div>
      <div class="speed-row">
        <button class="spd-btn" onclick="selectSpeed(0.25)">0.25×</button>
        <button class="spd-btn" onclick="selectSpeed(0.50)">0.50×</button>
        <button class="spd-btn" onclick="selectSpeed(0.75)">0.75×</button>
        <button class="spd-btn active" onclick="selectSpeed(1.0)">1.0×</button>
        <button class="spd-btn" onclick="selectSpeed(1.25)">1.25×</button>
        <button class="spd-btn" onclick="selectSpeed(1.50)">1.50×</button>
        <button class="spd-btn" onclick="selectSpeed(1.75)">1.75×</button>
        <button class="spd-btn" onclick="selectSpeed(2.0)">2.0×</button>
      </div>
    </div>

    <!-- GO -->
    <div class="section hidden" id="sec-go">
      <button class="go-btn" onclick="goFullscreen()">▶ GO FULLSCREEN</button>
    </div>

  </div><!-- /left -->

  <!-- ══ BOTTOM / RIGHT — PREVIEW ══ -->
  <div id="right">

    <div class="preview-label">Live Preview</div>

    <div class="terminal">
      <div class="terminal-bar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <div class="terminal-title">lightforge.preview</div>
      </div>
      <div id="preview-canvas">
        <div id="preview-fx"></div>
      </div>
    </div>

    <div class="preview-info">
      MODE: <span id="info-mode">—</span>&nbsp;&nbsp;
      EFFECT: <span id="info-effect">—</span>&nbsp;&nbsp;
      SPEED: <span id="info-speed">1.0×</span>
    </div>

    <div class="brand-sig">✦ Created by Rahul Kumar Puri ✦</div>

  </div><!-- /right -->

</div><!-- /app -->

<!-- FULLSCREEN OVERLAY -->
<div id="fs-overlay">
  <div id="fs-left"><div id="fs-fx"></div></div>
  <div id="fs-right"></div>
  <div id="fs-escape">TAP TO EXIT</div>
</div>

<script>
const state = {
  mode: null,
  side: null,
  effect: null,
  speed: 1.0,
  windowRotated: false,
};

const staticEffects = new Set(['white', 'red', 'window', 'hacker']);
const baseDurations = {
  'gradient-glow': 4,
  'flash': 1,
  'rgb': 3,
  'glitch': 0.4,
  'hypno': 3,
};

function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }

let hackerTimers = [];
const chars = '01アカキクケコサシスセ!@#$%^&*><{}[]|01アカ';

function applyEffect(el, effect, speed) {
  // Clear
  el.className = el.className.replace(/\bfx-\S+/g, '').trim();
  el.innerHTML = '';
  el.style.background = '';
  el.style.animation  = '';
  hackerTimers.forEach(clearInterval);
  hackerTimers = [];

  const base = baseDurations[effect];
  const dur  = base ? (base / speed).toFixed(2) + 's' : '3s';
  el.style.setProperty('--spd', dur);

  el.classList.add('fx-' + effect);

  if (effect === 'window' && state.windowRotated) el.classList.add('rotated');

  if (effect === 'hacker') {
    el.style.background = '#000';
    const div = document.createElement('div');
    div.className = 'hacker-text';
    el.appendChild(div);
    const cols = Math.max(8,  Math.floor(el.offsetWidth  / 7));
    const rows = Math.max(4,  Math.floor(el.offsetHeight / 15));
    function rnd() {
      let s = '';
      for (let i = 0; i < cols; i++) s += chars[Math.floor(Math.random() * chars.length)];
      return s;
    }
    function tick() {
      let out = '';
      for (let r = 0; r < rows; r++) out += rnd() + '\n';
      div.textContent = out;
    }
    const t = setInterval(tick, Math.max(40, 120 / speed));
    hackerTimers.push(t);
    tick();
  }
}

/* ── MODE ── */
function selectMode(m) {
  state.mode = m;
  document.getElementById('btn-full').classList.toggle('active', m === 'full');
  document.getElementById('btn-half').classList.toggle('active', m === 'half');
  document.getElementById('info-mode').textContent = m.toUpperCase();

  if (m === 'half') {
    show('sec-side');
    hide('sec-effect');
    hide('sec-rotate');
    hide('sec-speed');
    hide('sec-go');
  } else {
    hide('sec-side');
    state.side = null;
    show('sec-effect');
  }
  updatePreview();
}

/* ── SIDE ── */
function selectSide(s) {
  state.side = s;
  document.getElementById('btn-left').classList.toggle('active',  s === 'left');
  document.getElementById('btn-right').classList.toggle('active', s === 'right');
  show('sec-effect');
  updatePreview();
}

/* ── EFFECT ── */
function selectEffect(fx) {
  state.effect = fx;

  document.querySelectorAll('.fx-btn').forEach(b => b.classList.remove('active'));
  const names = ['gradient-glow','white','red','flash','rgb','window','hacker','glitch','hypno'];
  const idx = names.indexOf(fx);
  if (idx >= 0) document.querySelectorAll('.fx-btn')[idx].classList.add('active');

  document.getElementById('info-effect').textContent = fx.toUpperCase().replace('-',' ');

  // Window rotate
  if (fx === 'window') { show('sec-rotate'); } else { hide('sec-rotate'); }

  // Speed
  if (!staticEffects.has(fx)) { show('sec-speed'); } else { hide('sec-speed'); }

  show('sec-go');
  updatePreview();
}

/* ── WINDOW ROTATE ── */
function setWindowRotate(r) {
  state.windowRotated = r;
  document.getElementById('rot-v').classList.toggle('active', !r);
  document.getElementById('rot-h').classList.toggle('active',  r);
  updatePreview();
  if (document.getElementById('fs-overlay').classList.contains('active') && state.effect === 'window') {
    applyEffect(document.getElementById('fs-fx'), 'window', state.speed);
  }
}

/* ── SPEED ── */
function selectSpeed(s) {
  state.speed = s;
  document.getElementById('info-speed').textContent = s + '×';
  document.querySelectorAll('.spd-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.textContent) === s);
  });
  updatePreview();
  if (document.getElementById('fs-overlay').classList.contains('active') && state.effect) {
    applyEffect(document.getElementById('fs-fx'), state.effect, state.speed);
  }
}

/* ── PREVIEW ── */
function updatePreview() {
  const fxEl = document.getElementById('preview-fx');
  fxEl.className = '';
  fxEl.innerHTML = '';
  fxEl.style.cssText = 'position:absolute; inset:0; width:100%; height:100%;';

  if (!state.effect) return;

  if (state.mode === 'half' && state.side) {
    fxEl.style.width  = '50%';
    fxEl.style.height = '100%';
    fxEl.style.top    = '0';
    fxEl.style.left   = (state.side === 'left') ? '50%' : '0';
  }

  applyEffect(fxEl, state.effect, state.speed);
}

/* ── FULLSCREEN ── */
function goFullscreen() {
  if (!state.effect) return;

  const overlay = document.getElementById('fs-overlay');
  const fsLeft  = document.getElementById('fs-left');
  const fsRight = document.getElementById('fs-right');
  let   fsFx    = document.getElementById('fs-fx');

  // Ensure fsFx is in fsLeft to start
  if (!fsLeft.contains(fsFx)) { fsLeft.innerHTML = ''; fsLeft.appendChild(fsFx); }

  overlay.classList.add('active');

  if (state.mode === 'full') {
    fsLeft.style.cssText  = 'flex:1; overflow:hidden;';
    fsRight.style.display = 'none';
    fsFx.style.cssText    = 'width:100%; height:100%; position:relative; overflow:hidden;';
  } else {
    fsRight.style.display = 'block';
    if (state.side === 'left') {
      // left=black, right=effect
      fsLeft.style.cssText  = 'flex:1; background:#000;';
      fsRight.style.cssText = 'flex:1; overflow:hidden; position:relative;';
      fsFx.style.cssText    = 'width:100%; height:100%; position:relative; overflow:hidden;';
      fsRight.innerHTML = '';
      fsRight.appendChild(fsFx);
    } else {
      // right=black, left=effect
      fsLeft.style.cssText  = 'flex:1; overflow:hidden; position:relative;';
      fsRight.style.cssText = 'flex:1; background:#000;';
      fsFx.style.cssText    = 'width:100%; height:100%; position:relative; overflow:hidden;';
      fsLeft.innerHTML = '';
      fsLeft.appendChild(fsFx);
    }
  }

  applyEffect(fsFx, state.effect, state.speed);
  document.documentElement.requestFullscreen?.().catch(() => {});
}

/* ── EXIT ── */
function exitFs() {
  const overlay = document.getElementById('fs-overlay');
  if (!overlay.classList.contains('active')) return;
  overlay.classList.remove('active');

  const fsLeft  = document.getElementById('fs-left');
  const fsRight = document.getElementById('fs-right');
  const fsFx    = document.getElementById('fs-fx');

  fsLeft.innerHTML = '';
  fsLeft.appendChild(fsFx);
  fsLeft.style.cssText  = 'flex:1; overflow:hidden;';
  fsRight.style.cssText = 'flex:1; background:#000;';
  fsFx.style.cssText    = 'width:100%; height:100%;';
  fsFx.className        = '';
  fsFx.innerHTML        = '';

  hackerTimers.forEach(clearInterval);
  hackerTimers = [];

  document.exitFullscreen?.().catch(() => {});
}

// Tap to exit on mobile
document.getElementById('fs-overlay').addEventListener('click', exitFs);
document.addEventListener('keydown', e => { if (e.key === 'Escape') exitFs(); });
document.addEventListener('fullscreenchange', () => { if (!document.fullscreenElement) exitFs(); });
</script>
