<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSINT App Launcher</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }
    h1 {
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      max-width: 600px;
      margin: auto;
    }
    button {
      padding: 20px;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      cursor: pointer;
      background: #1e293b;
      color: white;
      transition: 0.3s;
    }
    button:hover {
      background: #334155;
      transform: scale(1.05);
    }
  </style>
</head>
<body>  <h1>📱 OSINT App Launcher (Fixed)</h1>  <div class="grid">
    <button onclick="openIntent('com.eyecon.global')">Eyecon</button>
    <button onclick="openIntent('com.phonepe.app')">PhonePe</button>
    <button onclick="openIntent('com.google.android.apps.nbu.paisa.user')">Google Pay</button>
    <button onclick="openIntent('net.one97.paytm')">Paytm</button>
    <button onclick="openIntent('com.truecaller')">Truecaller</button>
    <button onclick="openIntent('com.callapp.contacts')">CallApp</button>
  </div>  <script>
    function openIntent(packageName) {
      const intentUrl = `intent://#Intent;package=${packageName};end`;
      window.location = intentUrl;
    }
  </script></body>
</html>
