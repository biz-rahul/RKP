
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Apps</title>
 <link rel="manifest" href="/Z/WebApps/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background: #080810;
    overflow-x: hidden;
  }

  .launcher-root {
    min-height: 100vh;
    padding: 3rem 1.8rem 4rem;
    position: relative;
    overflow: hidden;
  }

  /* Ambient orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 70%);
    top: -180px; left: -130px;
    animation: drift1 12s ease-in-out infinite alternate;
  }
  .orb2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(236,72,153,0.28) 0%, transparent 70%);
    bottom: -100px; right: -80px;
    animation: drift2 15s ease-in-out infinite alternate;
  }
  .orb3 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(6,182,212,0.2) 0%, transparent 70%);
    top: 45%; left: 55%;
    animation: drift3 10s ease-in-out infinite alternate;
  }

  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(40px, 30px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-30px, -20px); } }
  @keyframes drift3 { from { transform: translate(0,0); } to { transform: translate(20px, -30px); } }

  /* Grid overlay texture */
  .grid-texture {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== MOBILE LAYOUT (default) ===== */
  .content {
    position: relative;
    z-index: 2;
    max-width: 420px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 3.2rem;
  }

  .clock {
    font-family: 'Syne', sans-serif;
    font-size: clamp(4rem, 15vw, 6.5rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 0.4rem;
    background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .date-str {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 300;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    margin-bottom: 1.1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: rgba(255,255,255,0.08);
  }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.1rem 0.9rem;
    margin-bottom: 2.2rem;
  }

  .app-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.55rem;
    text-decoration: none;
    cursor: pointer;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.65) translateY(14px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .app-icon-shell {
    width: 68px;
    height: 68px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.055);
    border: 0.5px solid rgba(255,255,255,0.1);
    position: relative;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;
    overflow: hidden;
  }

  .app-icon-shell::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    border-radius: 20px 20px 0 0;
    pointer-events: none;
  }

  .app-card:hover .app-icon-shell {
    transform: scale(1.13) translateY(-4px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 0 1.5px rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.2);
  }
  .app-card:active .app-icon-shell {
    transform: scale(0.94) translateY(0);
    transition-duration: 0.08s;
  }

  .app-icon-shell img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    border-radius: 8px;
    position: relative;
    z-index: 1;
  }

  .fallback-letter {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    position: relative;
    z-index: 1;
  }

  .app-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid rgba(10,10,20,0.9);
    z-index: 2;
  }

  .app-name {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
    text-align: center;
    letter-spacing: 0.01em;
    max-width: 72px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 0.15s;
  }
  .app-card:hover .app-name { color: rgba(255,255,255,0.9); }

  .home-bar {
    display: flex;
    justify-content: center;
    margin-top: 2.5rem;
  }
  .home-pill {
    width: 120px;
    height: 4px;
    border-radius: 4px;
    background: rgba(255,255,255,0.2);
  }

  /* Desktop sidebar — hidden on mobile */
  .desktop-sidebar { display: none; }

  /* ===== DESKTOP LAYOUT (≥900px) ===== */
  @media (min-width: 900px) {
    .launcher-root {
      display: flex;
      align-items: stretch;
      min-height: 100vh;
      padding: 0;
    }

    /* Left sidebar: clock + info */
    .desktop-sidebar {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      width: 320px;
      flex-shrink: 0;
      padding: 3rem 2.5rem;
      border-right: 0.5px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.018);
      backdrop-filter: blur(2px);
      position: relative;
      z-index: 2;
    }

    .desktop-sidebar .clock {
      font-size: 5.5rem;
      letter-spacing: -0.05em;
      margin-bottom: 0.5rem;
    }

    .desktop-sidebar .date-str {
      font-size: 0.72rem;
      margin-bottom: 3rem;
    }

    .sidebar-divider {
      width: 40px;
      height: 0.5px;
      background: rgba(255,255,255,0.15);
      margin-bottom: 2rem;
    }

    .sidebar-tagline {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
      max-width: 220px;
    }

    .sidebar-tagline span {
      color: rgba(255,255,255,0.9);
    }

    .sidebar-count {
      margin-top: auto;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Right main area: scrollable app grid */
    .content {
      flex: 1;
      max-width: none;
      margin: 0;
      padding: 3rem 3.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow-y: auto;
    }

    /* Hide mobile header inside .content on desktop */
    .content > .header { display: none; }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      margin-bottom: 1.4rem;
    }

    .apps-grid {
      grid-template-columns: repeat(6, 1fr);
      gap: 1.6rem 1.2rem;
      margin-bottom: 3rem;
    }

    .app-icon-shell {
      width: 88px;
      height: 88px;
      border-radius: 24px;
    }

    .app-icon-shell img {
      width: 52px;
      height: 52px;
    }

    .fallback-letter {
      width: 52px;
      height: 52px;
      font-size: 1.5rem;
    }

    .app-name {
      font-size: 0.72rem;
      max-width: 92px;
    }

    .home-bar { display: none; }
  }

  /* Extra wide screens */
  @media (min-width: 1400px) {
    .desktop-sidebar { width: 380px; padding: 4rem 3rem; }
    .desktop-sidebar .clock { font-size: 6.5rem; }
    .content { padding: 4rem 5rem; }
    .apps-grid {
      grid-template-columns: repeat(7, 1fr);
      gap: 2rem 1.5rem;
    }
    .app-icon-shell { width: 96px; height: 96px; border-radius: 26px; }
    .app-icon-shell img { width: 58px; height: 58px; }
  }
</style>
</head>
<body>
<div class="launcher-root">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="grid-texture"></div>

  <aside class="desktop-sidebar">
    <div class="clock" id="clock-desk">00:00</div>
    <div class="date-str" id="datestr-desk"></div>
    <div class="sidebar-divider"></div>
    <p class="sidebar-tagline">Your <span>apps,</span><br>one place.</p>
    <p class="sidebar-count" id="app-count-desk"></p>
  </aside>

  <div class="content">
    <div class="header">
      <div class="clock" id="clock">00:00</div>
      <div class="date-str" id="datestr"></div>
    </div>

    <div class="section-label">Social Media</div>
    <div class="apps-grid" id="social-grid"></div>

    <div class="section-label">Google Apps</div>
    <div class="apps-grid" id="google-grid"></div>

    <div class="section-label">Others</div>
    <div class="apps-grid" id="others-grid"></div>

    <div class="home-bar"><div class="home-pill"></div></div>
  </div>
</div>

<script>
const APPS = {
  social: [
    { name: 'Pinterest', url: 'https://pinterest.com', icon: 'https://www.google.com/s2/favicons?domain=pinterest.com&sz=128' },
    { name: 'Reddit', url: 'https://reddit.com', icon: 'https://www.google.com/s2/favicons?domain=reddit.com&sz=128' },
    { name: 'Facebook', url: 'https://facebook.com', icon: 'https://www.google.com/s2/favicons?domain=facebook.com&sz=128' },
    { name: 'TikTok', url: 'https://tiktok.com', icon: 'https://www.google.com/s2/favicons?domain=tiktok.com&sz=128' },
    { name: 'Douyin', url: 'https://www.douyin.com', icon: 'https://www.google.com/s2/favicons?domain=douyin.com&sz=128' },
    { name: 'Twitter (X)', url: 'https://x.com', icon: 'https://www.google.com/s2/favicons?domain=x.com&sz=128' },
    { name: 'LinkedIn', url: 'https://linkedin.com', icon: 'https://www.google.com/s2/favicons?domain=linkedin.com&sz=128' },
    { name: 'Discord', url: 'https://discord.com/channels/@me', icon: 'https://www.google.com/s2/favicons?domain=discord.com&sz=128' },
    { name: 'Telegram', url: 'https://web.telegram.org/', icon: 'https://www.google.com/s2/favicons?domain=telegram.org&sz=128' },
  ],

  google: [
    { name: 'Gemini', url: 'https://gemini.google.com', icon: 'https://www.google.com/s2/favicons?domain=gemini.google.com&sz=128' },
    { name: 'Contacts', url: 'https://contacts.google.com', icon: 'https://www.gstatic.com/images/branding/product/1x/contacts_2022_48dp.png' },
    { name: 'Translate', url: 'https://translate.google.com', icon: 'https://www.google.com/s2/favicons?domain=translate.google.com&sz=128' },
    { name: 'Calendar', url: 'https://calendar.google.com', icon: 'https://www.gstatic.com/images/branding/product/1x/calendar_2020q4_48dp.png' },
    { name: 'Drive', url: 'https://drive.google.com', icon: 'https://www.gstatic.com/images/branding/product/1x/drive_2020q4_48dp.png' },
    { name: 'Google One', url: 'https://one.google.com/?g1_landing_page=1', icon: 'https://www.google.com/s2/favicons?domain=one.google.com&sz=128' },
    { name: 'Saved Interests', url: 'https://www.google.com/interests/saved', icon: 'https://www.google.com/s2/favicons?domain=google.com&sz=128' },
    { name: 'Google Photos', url: 'https://photos.google.com/', icon: 'https://www.google.com/s2/favicons?domain=photos.google.com&sz=128' },
    { name: 'Chrome Web Store', url: 'https://chromewebstore.google.com/', icon: 'https://www.google.com/s2/favicons?domain=chromewebstore.google.com&sz=128' },
  ],

  search: [
    { name: 'Google', url: 'https://www.google.com/', icon: 'https://www.google.com/s2/favicons?domain=google.com&sz=128' },
    { name: 'Bing', url: 'https://www.bing.com/', icon: 'https://www.google.com/s2/favicons?domain=bing.com&sz=128' },
    { name: 'Yahoo', url: 'https://in.search.yahoo.com/?fr2=inr', icon: 'https://www.google.com/s2/favicons?domain=yahoo.com&sz=128' },
    { name: 'Baidu', url: 'https://www.baidu.com/', icon: 'https://www.google.com/s2/favicons?domain=baidu.com&sz=128' },
    { name: 'Yandex', url: 'https://yandex.com/', icon: 'https://www.google.com/s2/favicons?domain=yandex.com&sz=128' },
    { name: 'DuckDuckGo', url: 'https://duckduckgo.com/', icon: 'https://www.google.com/s2/favicons?domain=duckduckgo.com&sz=128' },
    { name: 'Naver', url: 'https://www.naver.com/', icon: 'https://www.google.com/s2/favicons?domain=naver.com&sz=128' },
  ],

  others: [
    { name: 'Notion', url: 'https://notion.so', icon: 'https://www.google.com/s2/favicons?domain=notion.so&sz=128' },
    { name: 'GitHub', url: 'https://github.com', icon: 'https://www.google.com/s2/favicons?domain=github.com&sz=128' },
    { name: 'Rahul Kumar Puri', url: 'https://rahulpuri.fun', icon: 'https://www.google.com/s2/favicons?domain=rahulpuri.fun&sz=128' },
    { name: 'Emojipedia', url: 'https://emojipedia.org/', icon: 'https://www.google.com/s2/favicons?domain=emojipedia.org&sz=128' },
  ]
};

 // Badge colors for a few apps (decorative)
const BADGE_COLORS = {
  'Pinterest': '#ef4444',
  'Facebook': '#3b82f6',
  'Reddit': '#f97316',
};
 
function buildGrid(id, list) {
  const grid = document.getElementById(id);
  list.forEach((app, i) => {
    const card = document.createElement('a');
    card.className = 'app-card';
    card.href = app.url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.style.animationDelay = `${i * 0.075}s`;

    const shell = document.createElement('div');
    shell.className = 'app-icon-shell';

    // Favicon img
    const img = document.createElement('img');
    img.src = app.icon;
    img.alt = app.name;
    img.loading = 'lazy';
    img.onerror = function() {
      this.remove();
      const fb = document.createElement('div');
      fb.className = 'fallback-letter';
      fb.textContent = app.name[0].toUpperCase();
      shell.appendChild(fb);
    };
    shell.appendChild(img);

    // Decorative badge for some apps
    if (BADGE_COLORS[app.name]) {
      const badge = document.createElement('div');
      badge.className = 'app-badge';
      badge.style.background = BADGE_COLORS[app.name];
      shell.appendChild(badge);
    }

    const label = document.createElement('span');
    label.className = 'app-name';
    label.textContent = app.name;

    card.appendChild(shell);
    card.appendChild(label);
    grid.appendChild(card);
  });
}

buildGrid('social-grid', APPS.social);
buildGrid('google-grid', APPS.google);
buildGrid('others-grid', APPS.others);

// Clock — syncs both mobile and desktop elements
const totalApps = APPS.social.length + APPS.google.length + APPS.others.length;
const countEl = document.getElementById('app-count-desk');
if (countEl) countEl.textContent = totalApps + ' apps linked';

function tick() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const timeStr = h + ':' + m;

  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();

  document.getElementById('clock').textContent = timeStr;
  document.getElementById('datestr').textContent = dateStr;

  const cd = document.getElementById('clock-desk');
  const dd = document.getElementById('datestr-desk');
  if (cd) cd.textContent = timeStr;
  if (dd) dd.textContent = dateStr;
}
tick();
setInterval(tick, 10000);
</script>
</body>
</html>
