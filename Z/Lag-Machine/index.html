<!DOCTYPE html>
<html>
<head>
<title>Lag Machine 3000 💀</title>
<style>
body {
  margin:0;
  font-family: monospace;
  background:black;
  color:#0f0;
  overflow:hidden;
}

/* HEAVY ANIMATION */
@keyframes crazy {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.5); }
  100% { transform: rotate(360deg) scale(1); }
}

.box {
  width:50px;
  height:50px;
  background:red;
  position:absolute;
  animation:crazy 0.5s infinite;
}
</style>
</head>
<body>

<h1>🔥 Lag Machine Activated 🔥</h1>
<button onclick="startChaos()">START CHAOS 😈</button>

<script>
function startChaos(){

  // 1. MASSIVE LOREM GENERATOR 💀
  let text = "";
  let words = ["lorem","ipsum","dolor","sit","amet"];
  
  for(let i=0;i<1000000;i++){   // 10 LAKH WORDS
    text += words[Math.floor(Math.random()*words.length)] + " ";
  }
  
  let div = document.createElement("div");
  div.innerText = text;
  document.body.appendChild(div);

  // 2. DOM SPAM 😭
  setInterval(()=>{
    for(let i=0;i<500;i++){
      let el = document.createElement("div");
      el.className = "box";
      el.style.top = Math.random()*window.innerHeight+"px";
      el.style.left = Math.random()*window.innerWidth+"px";
      document.body.appendChild(el);
    }
  },50);

  // 3. CPU BURNER 🔥
  setInterval(()=>{
    let x = 0;
    for(let i=0;i<1e7;i++){
      x += Math.sqrt(i) * Math.random();
    }
  },10);

  // 4. MEMORY LEAK 💀
  let arr = [];
  setInterval(()=>{
    arr.push(new Array(1000000).fill("💀"));
  },100);

  // 5. SCROLL SPAM 📜
  setInterval(()=>{
    window.scrollTo(0, Math.random()*100000);
  },20);

  // 6. REPAINT SPAM 🎨
  setInterval(()=>{
    document.body.style.background = 
      "#" + Math.floor(Math.random()*16777215).toString(16);
  },30);
}
</script>

</body>
</html>
