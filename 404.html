<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <script>
    // 🔥 SINGLE source of truth (sab redirect yahi likh)
    const redirects = {
      "/books": "/#books",
      "/contact": "/#contact",
      "/faqs": "/#faq"
    };

    // Normalize path (case + slash fix)
    let path = window.location.pathname.toLowerCase().replace(/\/$/, "");

    // 🚀 Redirect if match found
    if (redirects[path]) {
      window.location.replace(redirects[path]);
    }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
    }

    .glow {
      font-size: 10rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff;
      animation: flicker 2s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    h2 {
      margin-top: -20px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    p {
      margin: 20px 0;
      opacity: 0.8;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      border-radius: 30px;
      text-decoration: none;
      color: #fff;
      border: 1px solid #fff;
      transition: 0.3s;
    }

    a:hover {
      background: #ff00ff;
      border-color: #ff00ff;
      box-shadow: 0 0 15px #ff00ff;
    }

    .floating {
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      animation: float 6s infinite ease-in-out;
    }

    .floating:nth-child(1) {
      top: -50px;
      left: -50px;
    }

    .floating:nth-child(2) {
      bottom: -60px;
      right: -60px;
      animation-delay: 2s;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="floating"></div>
    <div class="floating"></div>

    <div class="glow">404</div>
    <h2>You are LOST...</h2>
    <p>The page you are looking for does not exist or has been moved.</p>

    <a id="homeLink" href="https://rahulpuri.fun/">Go Back Home</a>
  </div>

  <footer>
    © 2026 Rahul Kumar Puri | rahulpuri.fun
  </footer>

  <script>
    // 👇 Button bhi smart banega
    const redirects = {
      "/books": "/#books",
      "/contact": "/#contact",
      "/faqs": "/#faq"
    };

    let path = window.location.pathname.toLowerCase().replace(/\/$/, "");
    const btn = document.getElementById("homeLink");

    if (redirects[path]) {
      btn.href = redirects[path];
    }
  </script>
</body>
</html>
