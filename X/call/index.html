<!DOCTYPE html>
<html lang="en">
  <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Request a Callback</title>
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0e1117;
    --surface2: #151820;
    --border: rgba(255,255,255,0.07);
    --accent: #e8ff47;
    --accent2: #ff4f7b;
    --text: #f0f2f7;
    --muted: #5a6178;
    --glow: rgba(232, 255, 71, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
  }
  .bg-blob-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #e8ff47, transparent);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .bg-blob-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #ff4f7b, transparent);
    bottom: -80px; right: -80px;
    animation-delay: -4s;
  }
  .bg-blob-3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, #4f8bff, transparent);
    top: 50%; left: 50%;
    animation-delay: -2s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  /* Grid lines background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  /* Top badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232, 255, 71, 0.08);
    border: 1px solid rgba(232, 255, 71, 0.2);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .badge-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  h1 span {
    color: var(--accent);
    position: relative;
    display: inline-block;
  }
  h1 span::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.4;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,255,71,0.4), transparent);
  }

  /* Input groups */
  .input-group {
    margin-bottom: 16px;
  }
  .input-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
    opacity: 0.5;
  }
  .input-icon-top {
    top: 16px;
    transform: none;
  }

  input, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 14px 14px 44px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.25s ease;
    -webkit-appearance: none;
    appearance: none;
  }
  input::placeholder, textarea::placeholder {
    color: var(--muted);
    font-size: 14px;
  }
  input:focus, textarea:focus {
    border-color: rgba(232, 255, 71, 0.4);
    background: rgba(232, 255, 71, 0.04);
    box-shadow: 0 0 0 4px rgba(232, 255, 71, 0.06);
  }
  textarea {
    resize: none;
    height: 100px;
    line-height: 1.5;
    padding-top: 14px;
  }

  /* Phone number hint */
  .input-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    padding-left: 2px;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Submit button */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: #080a0f;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(232, 255, 71, 0.3);
  }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: translateY(0); }
  .btn-icon { font-size: 18px; transition: transform 0.3s; }
  .btn:hover .btn-icon { transform: translateX(4px); }

  /* Loading state */
  .btn.loading {
    pointer-events: none;
    opacity: 0.7;
  }
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text, .btn.loading .btn-icon { display: none; }

  /* Privacy note */
  .privacy-note {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .privacy-note span:first-child { font-size: 14px; flex-shrink: 0; }
  .privacy-note p {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid rgba(232, 255, 71, 0.3);
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
    opacity: 0;
    white-space: nowrap;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast-icon { font-size: 18px; }
  .toast.error { border-color: rgba(255, 79, 123, 0.3); }

  /* Animations on load */
  .wrapper > * {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.5s ease forwards;
  }
  .badge { animation-delay: 0.1s; }
  h1 { animation-delay: 0.2s; }
  .subtitle { animation-delay: 0.3s; }
  .card { animation-delay: 0.4s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 440px) {
    h1 { font-size: 28px; }
    .card { padding: 20px; border-radius: 20px; }
  }
</style>
  </head>
  <body>

	<div class="bg-blob bg-blob-1"></div>
	<div class="bg-blob bg-blob-2"></div>
	<div class="bg-blob bg-blob-3"></div>

	<div class="wrapper">
	  <div class="badge">
		<span class="badge-dot"></span>
		Available Now
	  </div>

	  <h1>We'll Call <span>You Back</span></h1>
	  <p class="subtitle">Drop your number and we'll reach out within minutes. No spam, ever.</p>

	  <div class="card">
		<div class="input-group">
		  <label class="input-label">Phone Number</label>
		  <div class="input-wrap">
			<span class="input-icon">📱</span>
			<input type="tel" id="phone" placeholder="9XXXXXXXXX" maxlength="10" inputmode="numeric" pattern="[0-9]*">
		  </div>
		  <p class="input-hint">10-digit Indian mobile number</p>
		</div>

		<div class="input-group">
		  <label class="input-label">Message <span style="opacity:0.4">(optional)</span></label>
		  <div class="input-wrap">
			<span class="input-icon input-icon-top">💬</span>
			<textarea id="note" placeholder="Tell us what it's about..."></textarea>
		  </div>
		</div>

		<div class="divider">
		  <div class="divider-line"></div>
		  <span class="divider-text">Secure & Private</span>
		  <div class="divider-line"></div>
		</div>

		<button class="btn" onclick="sendRequest()">
		  <span class="btn-text">Request Callback</span>
		  <span class="btn-icon">→</span>
		  <span class="spinner"></span>
		</button>

		<div class="privacy-note">
		  <span>🔒</span>
		  <p>Your number is never shared or stored publicly. Only our team sees it.</p>
		</div>
	  </div>
	</div>

	<!-- Toast -->
	<div class="toast" id="toast">
	  <span class="toast-icon" id="toast-icon">✅</span>
	  <span id="toast-msg">Request sent! We'll call you soon.</span>
	</div>

<script>
  const encodedToken = "ODUyNDM5OTY5MjpBQUg4Uk5GbzZVZktDcjgxSUM1c1k2Rk8yMGh4QUJTX3VQUQ==";
  const encodedChatId = "NjI3NzQzMjM1Ng==";

  function decode(str) { return atob(str); }

  function isValidPhone(phone) {
    return /^[6-9]\d{9}$/.test(phone);
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    const icon = document.getElementById('toast-icon');
    document.getElementById('toast-msg').textContent = msg;
    icon.textContent = isError ? '❌' : '✅';
    toast.classList.toggle('error', isError);
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  function sendRequest() {
    const phone = document.getElementById('phone').value.trim();
    const note = document.getElementById('note').value.trim();
    const btn = document.querySelector('.btn');

    if (!isValidPhone(phone)) {
      showToast('Enter a valid 10-digit number (starts with 6–9)', true);
      document.getElementById('phone').focus();
      return;
    }

    const message = `📞 Callback Request\nPhone: ${phone}\nNote: ${note || 'N/A'}`;
    const botToken = decode(encodedToken);
    const chatId = decode(encodedChatId);

    btn.classList.add('loading');

    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: chatId, text: message })
    })
    .then(res => res.json())
    .then(data => {
      btn.classList.remove('loading');
      if (data.ok) {
        showToast("Request sent! We'll call you soon. 🎉");
        document.getElementById('phone').value = '';
        document.getElementById('note').value = '';
      } else {
        showToast('Could not send. Please try again.', true);
      }
    })
    .catch(() => {
      btn.classList.remove('loading');
      showToast('Network error. Check your connection.', true);
    });
  }

  // Only allow digits in phone
  document.getElementById('phone').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 10);
  });
</script>
	    <script src="../../bkl.js"></script>
  </body>
</html>
