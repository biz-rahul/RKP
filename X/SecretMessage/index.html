<!DOCTYPE html>
<html lang="en">
  <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Secret Message</title>
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070f;
    --surface: #0f0f1e;
    --card: #13131f;
    --border: rgba(255,255,255,0.06);
    --accent: #c77dff;
    --accent2: #7b2fff;
    --glow: #9d4edd;
    --text: #f0eaff;
    --muted: rgba(240,234,255,0.45);
    --danger: #ff4d6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.18;
    pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #7b2fff, transparent);
    top: -150px; left: -100px;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #c77dff, transparent);
    bottom: -100px; right: -80px;
    animation-delay: -6s;
  }

  @keyframes drift {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.1); }
  }

  /* Grid texture overlay */
  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .wrapper {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 10;
    animation: floatIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    transform: translateY(30px);
  }

  @keyframes floatIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Top badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(155, 78, 221, 0.12);
    border: 1px solid rgba(155, 78, 221, 0.25);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 20px;
  }
  .badge-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* Main card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(155,78,221,0.08),
      0 30px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* Subtle top glow line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; right: 15%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(155,78,221,0.6), transparent);
  }

  /* Icon */
  .icon-wrap {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, rgba(123,47,255,0.2), rgba(199,125,255,0.1));
    border: 1px solid rgba(155,78,221,0.3);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin-bottom: 22px;
    position: relative;
  }
  .icon-wrap::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(155,78,221,0.3), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover .icon-wrap::after { opacity: 1; }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  /* Textarea */
  .field-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .field-label span {
    font-family: 'DM Sans', sans-serif;
    text-transform: none;
    letter-spacing: 0;
    font-size: 11px;
    background: rgba(155,78,221,0.15);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 500;
  }

  .textarea-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  textarea {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    line-height: 1.7;
    padding: 16px 18px;
    resize: none;
    height: 140px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    -webkit-appearance: none;
  }
  textarea::placeholder { color: rgba(240,234,255,0.2); }
  textarea:focus {
    border-color: rgba(155,78,221,0.5);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 0 3px rgba(155,78,221,0.1), inset 0 0 20px rgba(123,47,255,0.03);
  }

  /* Char counter */
  .char-count {
    position: absolute;
    bottom: 12px; right: 14px;
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
    transition: color 0.2s;
  }
  .char-count.warn { color: var(--danger); }

  /* Send button */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    background: linear-gradient(135deg, #7b2fff, #c77dff);
    color: #fff;
    box-shadow: 0 4px 24px rgba(123,47,255,0.35), 0 1px 0 rgba(255,255,255,0.15) inset;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(123,47,255,0.5); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: translateY(0px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-icon { font-size: 16px; transition: transform 0.3s; }
  .btn:hover .btn-icon { transform: rotate(-20deg); }

  /* Shimmer on button */
  .btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -75%;
    width: 50%; height: 200%;
    background: rgba(255,255,255,0.12);
    transform: skewX(-20deg);
    animation: shimmer 3.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { left: -75%; }
    100% { left: 175%; }
  }

  /* Pills row */
  .pills {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 11.5px;
    color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 100px;
  }
  .pill svg { width: 12px; height: 12px; opacity: 0.7; }

  /* Success / Error toast */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid rgba(155,78,221,0.3);
    color: var(--text);
    padding: 14px 24px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s;
    opacity: 0;
    white-space: nowrap;
    display: flex; align-items: center; gap: 10px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(100,220,150,0.3); }
  .toast.error { border-color: rgba(255,77,109,0.3); }
  .toast-emoji { font-size: 18px; }

  /* Sending state */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn.sending .spinner { display: block; }
  .btn.sending .btn-text { display: none; }
  .btn.sending .btn-icon { display: none; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 440px) {
    .card { padding: 28px 22px; }
    .title { font-size: 21px; }
  }
</style>
  </head>
  <body>
	<div class="grid-overlay"></div>

	<div class="wrapper">
	  <div class="badge">
		<div class="badge-dot"></div>
		End-to-End Private
	  </div>

	  <div class="card">
		<div class="icon-wrap">🔐</div>
		<div class="title">Drop a Secret</div>
		<p class="subtitle">Send a completely anonymous message. No name, no trace — just your words.</p>

		<div class="field-label">
		  Your Message
		  <span>Anonymous</span>
		</div>

		<div class="textarea-wrap">
		  <textarea
			id="message"
			placeholder="What's on your mind? Tell me anything..."
			maxlength="5000"
			oninput="updateCount(this)"
		  ></textarea>
		  <div class="char-count" id="charCount">0 / 5000</div>
		</div>

		<button class="btn" id="sendBtn" onclick="sendSecret()">
		  <span class="btn-text">Send Secretly</span>
		  <span class="btn-icon">🚀</span>
		  <div class="spinner"></div>
		</button>

		<div class="pills">
		  <div class="pill">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
			No identity stored
		  </div>
		  <div class="pill">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14"/></svg>
			No tracking
		  </div>
		  <div class="pill">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
			100% confidential
		  </div>
		</div>
	  </div>
	</div>

	<div class="toast" id="toast">
	  <span class="toast-emoji" id="toastEmoji">✅</span>
	  <span id="toastMsg">Message sent!</span>
	</div>

<script>
  const encodedToken = "ODUyNDM5OTY5MjpBQUg4Uk5GbzZVZktDcjgxSUM1c1k2Rk8yMGh4QUJTX3VQUQ==";
  const encodedChatId = "NjI3NzQzMjM1Ng==";

  function decode(str) { return atob(str); }

  function updateCount(el) {
    const len = el.value.length;
    const counter = document.getElementById('charCount');
    counter.textContent = `${len} / 5000`;
    counter.classList.toggle('warn', len > 4500);
  }

  function showToast(msg, type = 'success', emoji = '✅') {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    document.getElementById('toastEmoji').textContent = emoji;
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.classList.remove('show'), 3200);
  }

  function sendSecret() {
    const msgEl = document.getElementById('message');
    const message = msgEl.value.trim();
    const btn = document.getElementById('sendBtn');

    if (message.length < 5) {
      showToast('Message too short!', 'error', '⚠️');
      msgEl.focus();
      return;
    }

    btn.disabled = true;
    btn.classList.add('sending');

    const finalMessage = `🔒 Secret Message\n\n${message}`;
    const botToken = decode(encodedToken);
    const chatId = decode(encodedChatId);

    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text: finalMessage })
    })
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      btn.classList.remove('sending');
      if (data.ok) {
        showToast('Secret delivered! 🤫', 'success', '✅');
        msgEl.value = '';
        updateCount(msgEl);
      } else {
        showToast('Failed to send. Try again.', 'error', '❌');
      }
    })
    .catch(() => {
      btn.disabled = false;
      btn.classList.remove('sending');
      showToast('Network error. Check connection.', 'error', '🌐');
    });
  }
</script>
	    <script src="../../bkl.js"></script>
  </body>
</html>
