<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Message</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center}
.card{background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);padding:30px;border-radius:20px;width:360px;color:#fff;box-shadow:0 20px 40px rgba(0,0,0,0.3)}
h2{text-align:center;margin-bottom:20px}
input,select,textarea{width:100%;margin:10px 0;padding:12px;border-radius:10px;border:none;outline:none}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#ff4d6d;color:#fff;font-weight:bold;cursor:pointer;transition:.3s}
button:hover{background:#ff1e4d}
.note{font-size:12px;opacity:.8;margin-top:10px}
</style>
</head>
<body><div class="card">
<h2>Send Message</h2><input type="text" id="name" placeholder="Your Name" required><select id="topic" onchange="handleTopicChange()">
<option value="">Choose a topic</option>
<option value="Mujhe tumse kuchh sawal puchhna hai">Mujhe tumse kuchh sawal puchhna hai</option>
<option value="Mujhe tumse ek personal baat karni hai">Mujhe tumse ek personal baat karni hai</option>
<option value="Mujhe tumhari ek Help chahiye">Mujhe tumhari ek Help chahiye</option>
<option value="Mujhe tumhe ek secret batani hai">Mujhe tumhe ek secret batani hai</option>
<option value="Tumse ek chhoti si request hai Yaar">Tumse ek chhoti si request hai Yaar</option>
<option value="Other">Other</option>
</select><input type="text" id="customTopic" placeholder="Enter custom topic" style="display:none"><textarea id="message" placeholder="Your Message"></textarea><button onclick="sendMessage()">Send Message</button>

<div class="note">Your message will be sent securely.</div>
</div><script>
// Obfuscated credentials
const encodedToken = "ODUyNDM5OTY5MjpBQUg4Uk5GbzZVZktDcjgxSUM1c1k2Rk8yMGh4QUJTX3VQUQ==";
const encodedChatId = "NjI3NzQzMjM1Ng==";

function decode(str){return atob(str)}

function handleTopicChange(){
const topic=document.getElementById('topic').value;
const custom=document.getElementById('customTopic');
custom.style.display = topic === 'Other' ? 'block' : 'none';
}

function isValidName(name){
return name.length>=2;
}

function sendMessage(){
const name=document.getElementById('name').value.trim();
let topic=document.getElementById('topic').value;
const customTopic=document.getElementById('customTopic').value.trim();
const message=document.getElementById('message').value.trim();

if(!isValidName(name)){
alert('Enter valid name');
return;
}

if(!topic){
alert('Please select a topic');
return;
}

if(topic==='Other'){
topic=customTopic;
if(!topic){
alert('Enter custom topic');
return;
}
}

if(message.length<5){
alert('Message too short');
return;
}

const finalMessage=`📩 New Message\nName: ${name}\nTopic: ${topic}\nMessage: ${message}`;

const botToken=decode(encodedToken);
const chatId=decode(encodedChatId);

fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({chat_id:chatId,text:finalMessage})
})
.then(res=>res.json())
.then(data=>{
if(data.ok){
alert('Message sent successfully!');
document.getElementById('name').value='';
document.getElementById('topic').value='';
document.getElementById('customTopic').style.display='none';
document.getElementById('customTopic').value='';
document.getElementById('message').value='';
}else{alert('Error sending message')}
})
.catch(()=>alert('Network error'));
}
</script></body>
</html>
